<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Directory Structure Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        /* =====================================================================
           GitHub Design Tokens
           ===================================================================== */
        :root {
            --color-canvas-default:   #ffffff;
            --color-canvas-subtle:    #f6f8fa;
            --color-canvas-inset:     #f6f8fa;
            --color-border-default:   #d0d7de;
            --color-border-muted:     #d8dee4;
            --color-fg-default:       #1f2328;
            --color-fg-muted:         #656d76;
            --color-fg-link:          #0969da;
            --color-accent-fg:        #0969da;
            --color-accent-subtle:    #ddf4ff;
            --color-success-fg:       #1a7f37;
            --color-success-btn:      #1f883d;
            --color-success-btn-hover:#1a7f37;
            --color-success-subtle:   #dafbe1;
            --color-danger-fg:        #d1242f;
            --color-danger-emphasis:  #cf222e;
            --color-danger-subtle:    #ffebe9;
            --color-done-fg:          #8250df;
            --color-done-subtle:      #fbefff;
            --color-neutral-btn:      #f6f8fa;
            --color-neutral-btn-hover:#eaeef2;
            --color-neutral-btn-border:#d0d7de;
            --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        }

        body.dark-mode {
            --color-canvas-default:   #0d1117;
            --color-canvas-subtle:    #161b22;
            --color-canvas-inset:     #010409;
            --color-border-default:   #30363d;
            --color-border-muted:     #21262d;
            --color-fg-default:       #e6edf3;
            --color-fg-muted:         #7d8590;
            --color-fg-link:          #58a6ff;
            --color-accent-fg:        #58a6ff;
            --color-accent-subtle:    #1f3c5e;
            --color-success-fg:       #3fb950;
            --color-success-btn:      #238636;
            --color-success-btn-hover:#2ea043;
            --color-success-subtle:   #0d2b18;
            --color-danger-fg:        #f85149;
            --color-danger-emphasis:  #da3633;
            --color-danger-subtle:    #3d0c09;
            --color-done-fg:          #bc8cff;
            --color-done-subtle:      #2e1a4a;
            --color-neutral-btn:      #21262d;
            --color-neutral-btn-hover:#30363d;
            --color-neutral-btn-border:#30363d;
        }

        /* =====================================================================
           Base
           ===================================================================== */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
                         Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-fg-default);
            background: var(--color-canvas-default);
            margin: 0;
            padding: 0;
            display: flex;
            overflow: hidden;
        }

        /* =====================================================================
           Layout helpers
           ===================================================================== */
        .flex,
        .flex-first,
        .flex-last {
            display: flex;
        }
        .flex-col {
            display: flex;
            flex-direction: column;
        }
        .flex-first > *:first-child,
        .flex-last > *:last-child {
            flex: 1;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
        }
        .flex-1 { flex: 1; }
        .gap-5 { gap: 5px; }
        .gap-8 { gap: 8px; }
        .h-100vh { height: 100vh; }

        /* =====================================================================
           App shell
           ===================================================================== */
        #app {
            display: flex;
            flex: 1;
            flex-direction: row;
            overflow: hidden;
            height: 100vh;
        }

        /* =====================================================================
           Panes
           ===================================================================== */
        .left-pane {
            flex: 0 0 var(--left-width, 400px);
            padding: 12px 14px;
            background-color: var(--color-canvas-subtle);
            border-right: 1px solid var(--color-border-default);
            box-sizing: border-box;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        .middle-pane {
            flex: 0 0 var(--middle-width, 460px);
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        .resize-handle {
            position: absolute; top: 0; right: -4px; width: 8px; height: 100%;
            cursor: col-resize; z-index: 50; touch-action: none;
        }
        .resize-handle::after {
            content: ''; position: absolute; top: 0; bottom: 0; left: 3px;
            width: 2px; background: var(--color-border-default);
        }
        .resize-handle:hover::after { background: var(--color-fg-muted); }
        .collapse-1 .resize-handle, .collapse-2 .resize-handle { display: none; }
        @media screen and (max-width: 768px) { .resize-handle { display: none; } }

        .right-pane {
            flex: 1;
            border-left: 1px solid var(--color-border-default);
            overflow-y: auto;
            min-width: 0;
            background: var(--color-canvas-default);
        }

        /* =====================================================================
           Mobile
           ===================================================================== */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 10px; left: 10px;
            z-index: 3000;
            background: var(--color-canvas-default);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            box-shadow: 0 1px 3px rgba(27,31,36,0.12);
        }
        .mobile-menu-btn span {
            display: block; width: 20px; height: 2px;
            background: var(--color-fg-default);
            margin: 4px 0; transition: 0.3s; border-radius: 2px;
        }

        @media screen and (max-width: 1200px) {
            .left-pane   { flex: 0 0 var(--left-width, 300px); }
            .middle-pane { flex: 0 0 var(--middle-width, 360px); }
        }
        @media screen and (max-width: 992px) {
            .left-pane   { flex: 0 0 var(--left-width, 280px); }
            .middle-pane { flex: 0 0 var(--middle-width, 320px); }
            .directory-tree { display: none; }
        }
        @media screen and (max-width: 768px) {
            .mobile-menu-btn { display: block; }
            .mobile-hidden   { display: none; }
            #app { flex-direction: column; }
            .left-pane {
                position: fixed; top: 0; left: -100%;
                width: 85%; max-width: 360px; height: 100vh;
                z-index: 2500; transition: left 0.3s ease;
                box-shadow: 2px 0 8px rgba(27,31,36,0.2);
                background-color: var(--color-canvas-subtle);
            }
            .left-pane.mobile-open { left: 0; }
            .mobile-menu-btn.active span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
            .mobile-menu-btn.active span:nth-child(2) { opacity: 0; }
            .mobile-menu-btn.active span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
            .middle-pane {
                flex: 1; width: 100%; max-height: 40vh;
                border-bottom: 1px solid var(--color-border-default);
            }
            .right-pane {
                flex: 1; width: 100%;
                border-left: none;
                border-top: 1px solid var(--color-border-default);
            }
            .selected-files ul li label { width: auto; max-width: 200px; }
            .controls-row { flex-wrap: wrap; }
            .controls-row button,
            .controls-row input { font-size: 14px; padding: 6px 10px; }
        }

        /* =====================================================================
           Global button & input base (GitHub style)
           ===================================================================== */
        button {
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            padding: 5px 12px;
            border: 1px solid var(--color-neutral-btn-border);
            border-radius: 6px;
            background: var(--color-neutral-btn);
            color: var(--color-fg-default);
            cursor: pointer;
            transition: background 80ms, border-color 80ms;
        }
        button:hover:not(:disabled) {
            background: var(--color-neutral-btn-hover);
            border-color: var(--color-border-default);
        }
        button:active:not(:disabled) {
            background: var(--color-canvas-inset);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        button:focus-visible {
            outline: 2px solid var(--color-accent-fg);
            outline-offset: 2px;
        }

        /* Primary (green) button — used via .btn-primary class */
        .btn-primary {
            background: var(--color-success-btn);
            border-color: rgba(31,35,40,0.15);
            color: #ffffff;
        }
        .btn-primary:hover:not(:disabled) {
            background: var(--color-success-btn-hover);
            border-color: rgba(31,35,40,0.15);
        }
        .btn-primary:active:not(:disabled) {
            background: var(--color-success-btn);
        }

        input, textarea, select {
            font-family: inherit;
            font-size: 14px;
            line-height: 20px;
            padding: 5px 10px;
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            background: var(--color-canvas-default);
            color: var(--color-fg-default);
            box-sizing: border-box;
            transition: border-color 80ms;
        }
        input:focus, textarea:focus, select:focus {
            outline: 2px solid var(--color-accent-fg);
            outline-offset: -1px;
            border-color: var(--color-accent-fg);
        }
        input::placeholder { color: var(--color-fg-muted); }
        input:disabled, textarea:disabled {
            background: var(--color-canvas-subtle);
            color: var(--color-fg-muted);
            cursor: not-allowed;
        }
        input[type="checkbox"] {
            accent-color: var(--color-accent-fg);
            outline: none;
        }
        input[type="checkbox"]:focus-visible {
            outline: 2px solid var(--color-accent-fg);
            outline-offset: 2px;
        }
        a { color: var(--color-fg-link); }
        a:hover { text-decoration: underline; }

        /* =====================================================================
           File list (left pane)
           ===================================================================== */
        .clear-button { margin-left: 10px; padding: 2px 8px; font-size: 0.9em; }
        .file-list { margin-top: 16px; }
        .file-item { margin: 2px 0; display: flex; align-items: center; min-height: 28px; }
        .file-item.directory label { text-decoration: underline; }
        .file-item input[type="checkbox"] { margin-right: 6px; flex-shrink: 0; }

        /* =====================================================================
           Middle pane
           ===================================================================== */
        .selected-files {
            overflow-x: hidden;
            padding-left: 5px; padding-right: 10px;
            flex: 1;
        }
        .selected-files ul { margin: 0; padding: 8px 0; list-style: none; }
        .selected-files ul li { margin-bottom: 1px; word-break: break-word; }
        .selected-files ul li label { flex: 1; width: 295px; white-space: nowrap; line-height: 28px; }
        .selected-files label.directory { text-decoration: underline; }

        .middle-pane__controls {
            background: var(--color-canvas-default);
            border-bottom: 1px solid var(--color-border-default);
            padding: 8px 12px;
        }
        .controls-row {
            display: flex;
            align-items: center;
            padding: 3px 0;
            gap: 6px;
        }
        .controls-row label { min-width: 70px; color: var(--color-fg-muted); font-size: 13px; }

        /* =====================================================================
           Right pane — file content
           ===================================================================== */
        .file-content-wrapper { height: 100%; position: relative; }
        .copy { position: absolute; top: 5px; right: 10px; margin: 5px; z-index: 1; }
        .file-content {
            font-family: var(--font-mono);
            font-size: 13px;
            white-space: pre-wrap;
            overflow: auto;
            outline: none;
            padding: 12px 16px;
            height: 100%;
            color: var(--color-fg-default);
        }
        textarea {
            width: 100%; height: 100%;
            border: none; border-radius: 0;
            background: var(--color-canvas-subtle);
            color: var(--color-fg-default);
            box-sizing: border-box;
            overflow: auto; resize: none;
            font-family: var(--font-mono);
            font-size: 14px;
            padding: 10px 12px;
        }
        textarea:focus {
            outline: none;
            border: none;
        }

        /* =====================================================================
           Content blocks (level nesting)
           ===================================================================== */
        .block-list { margin-left: 16px; margin-top: 2px; }
        .block-item { margin: 2px 0; font-size: 13px; }
        .block-item.level-1 {
            border-left: 3px solid var(--color-accent-fg);
            background: var(--color-accent-subtle);
            padding-left: 6px;
            border-radius: 0 4px 4px 0;
            margin-left: 20px;
        }
        .block-item.level-2 {
            border-left: 3px solid var(--color-done-fg);
            background: var(--color-done-subtle);
            padding-left: 6px;
            border-radius: 0 4px 4px 0;
            margin-left: 40px;
        }
        .small-button { margin-left: 4px; font-size: 12px; padding: 3px 8px; line-height: 20px; }

        /* Remove (x) button trong selected-files list */
        .selected-files .flex > button:last-child:not([class]) {
            margin-left: 4px;
            padding: 2px 7px;
            font-size: 13px;
            line-height: 20px;
            color: var(--color-fg-muted);
            background: transparent;
            border-color: transparent;
            flex-shrink: 0;
        }
        .selected-files .flex > button:last-child:not([class]):hover {
            color: var(--color-danger-fg);
            background: var(--color-danger-subtle);
            border-color: transparent;
        }

        /* =====================================================================
           Ace Editor
           ===================================================================== */
        .ace_editor {
            font: 14px/normal var(--font-mono) !important;
        }
        @media screen and (max-width: 768px) {
            .ace_editor { font-size: 13px !important; }
            .file-content { font-size: 13px; padding: 0 5px; }
            .sr-root { font-size: 13px; padding: 0 5px; }
            textarea { font-size: 13px; }
        }

        /* =====================================================================
           Collapse levels
           ===================================================================== */
        .expand-button { display: none; }
        .collapse-1 .left-pane {
            flex: 0 0 28px; cursor: pointer;
            justify-content: center; align-items: center; display: flex;
        }
        .collapse-1 .left-pane > * { display: none; }
        .collapse-1 .left-pane > .expand-button,
        .collapse-2 .left-pane > .expand-button { display: block; }
        .collapse-2 .middle-pane { flex: 0 0 0; }
        .collapse-2 .middle-pane > * { display: none; }
        @media screen and (max-width: 768px) {
            .collapse-1 .left-pane,
            .collapse-2 .left-pane,
            .collapse-2 .middle-pane {
                position: static; flex: initial;
            }
        }

        /* =====================================================================
           Directory tree
           ===================================================================== */
        .directory-tree {
            margin-top: 20px;
            font-family: var(--font-mono);
            font-size: 12px;
            background: var(--color-canvas-subtle);
            padding: 10px 12px;
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            color: var(--color-fg-default);
        }

        /* =====================================================================
           Search results
           ===================================================================== */
        .sr-root {
            height: 100%;
            overflow: auto;
            padding: 12px 16px;
            font-family: var(--font-mono);
            font-size: 13px;
            background: var(--color-canvas-default);
            color: var(--color-fg-default);
        }
        .sr-file { margin-top: 16px; }
        .sr-file-head { display: flex; align-items: baseline; gap: 6px; }
        .sr-collapser { width: 28px; cursor: pointer; color: var(--color-fg-muted); user-select: none; }
        .sr-path { color: var(--color-fg-link); text-decoration: underline; cursor: pointer; }
        .sr-preview { margin-left: 10px; white-space: pre; overflow: hidden; }
        .sr-hit {
            color: var(--color-accent-fg);
            background: var(--color-accent-subtle);
            font-weight: 600;
            padding: 1px 4px;
            border-radius: 4px;
        }
        .sr-summary { margin-top: 12px; color: var(--color-fg-muted); }

        /* =====================================================================
           Toast notifications
           ===================================================================== */
        .toast-container {
            position: fixed; top: 16px; right: 16px; z-index: 1300;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: none;
        }
        .toast {
            pointer-events: auto;
            display: flex; align-items: flex-start; gap: 10px;
            min-width: 280px; max-width: 420px;
            padding: 10px 14px;
            background: var(--color-canvas-default);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(27,31,36,0.12);
            animation: toast-in .15s ease;
            word-break: break-word;
            font-size: 14px;
        }
        .toast .title { font-weight: 600; margin-right: 6px; }
        .toast .msg { white-space: pre-wrap; word-break: break-word; }
        .toast .close {
            margin-left: auto; background: transparent;
            border: none; cursor: pointer; font-size: 16px; line-height: 1;
            color: var(--color-fg-muted);
        }
        .toast .close:hover { color: var(--color-fg-default); }
        .toast.info    { border-left: 3px solid var(--color-accent-fg); }
        .toast.success { border-left: 3px solid var(--color-success-fg); }
        .toast.warn    { border-left: 3px solid #9a6700; }
        .toast.error   { border-left: 3px solid var(--color-danger-fg); }
        @keyframes toast-in {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @media screen and (max-width: 768px) {
            .toast-container { top: 8px; right: 8px; }
            .toast { min-width: 240px; max-width: calc(100vw - 32px); }
        }

        /* =====================================================================
           Dark mode toggle
           ===================================================================== */
        .dark-mode-toggle {
            display: inline-flex;
            align-items: center; justify-content: center;
            padding: 2px 6px; cursor: pointer;
        }
        .dark-mode-toggle svg { width: 18px; height: 18px; fill: currentColor; }
        body.dark-mode .dark-mode-toggle svg { fill: #ffd700; stroke: #ffd700; }
        .dark-mode-toggle:hover svg { opacity: 0.8; }

        /* =====================================================================
           SplitButton
           ===================================================================== */
        .split-button { display: inline-flex; position: relative; margin-left: 6px; }
        /* Primary action button — left side of group */
        .split-button > button:first-child {
            border-radius: 6px 0 0 6px;
            border-right-width: 0;
        }
        /* Dropdown toggle — right side of group */
        .split-button > button:first-child + button {
            border-radius: 0 6px 6px 0;
            padding-left: 6px;
            padding-right: 6px;
            font-size: 11px;
            min-width: 24px;
        }
        .split-button > button:first-child:hover:not(:disabled) {
            border-right-width: 0;
        }
        .split-button .menu {
            position: absolute; top: 100%; right: 0; z-index: 50;
            min-width: 160px; max-height: 320px; overflow-y: auto;
            margin: 2px 0; padding: 4px 0; list-style: none;
            background: var(--color-canvas-default);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(27,31,36,0.12);
        }
        .split-button .menu.drop-down { top: 100%; }
        .split-button .menu.drop-up   { bottom: 100%; }
        .split-button .menu button {
            display: block; width: 100%; text-align: left;
            border: none; background: transparent;
            padding: 7px 14px; margin: 0; cursor: pointer;
            border-radius: 0;
            font-size: 14px;
            color: var(--color-fg-default);
        }
        .split-button .menu button:hover:not(:disabled) {
            background: var(--color-canvas-subtle);
        }
        .split-button .menu button:disabled { color: var(--color-fg-muted); }
        .split-button .small-button { margin-left: 0; }

        /* =====================================================================
           PathInput
           ===================================================================== */
        .path-input { position: relative; display: block; }
        .path-input .row { position: relative; display: flex; align-items: center; }
        .path-input input { flex: 1; padding-right: 28px; box-sizing: border-box; }
        .path-input .drop-btn {
            position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
            border: none; background: transparent; cursor: pointer;
            line-height: 1; font-size: 14px;
            width: 22px; height: 22px; padding: 0; border-radius: 4px;
        }
        .path-input .drop-btn:hover { background: rgba(27,31,36,0.08); }
        body.dark-mode .path-input .drop-btn:hover { background: rgba(255,255,255,0.08); }
        .path-input .drop-btn:focus-visible {
            outline: 2px solid var(--color-accent-fg); outline-offset: 1px;
        }

        /* =====================================================================
           Path menu
           ===================================================================== */
        .path-menu {
            position: fixed; z-index: 2000;
            margin: 0; padding: 4px 0; list-style: none;
            min-width: 160px;
            background: var(--color-canvas-default);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(27,31,36,0.12);
            overflow-y: auto;
        }
        .path-menu li { margin: 0; position: relative; }
        .path-menu li button {
            white-space: normal; overflow: visible; text-overflow: clip;
            overflow-wrap: anywhere; word-break: break-word;
            line-height: 1.25;
        }
        .path-menu li button:hover { background: var(--color-canvas-subtle); }
        .path-menu li button:focus-visible {
            outline: 2px solid var(--color-accent-fg);
            outline-offset: -2px;
            background: var(--color-accent-subtle);
        }
        .path-menu li button:disabled {
            color: var(--color-fg-muted); cursor: default; background: transparent;
        }
        .path-menu li .path-item { display: flex; align-items: center; gap: 4px; }
        .path-menu li .path-item .path-text {
            flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .path-menu li .delete-btn { opacity: 0; padding: 2px 6px; font-size: 14px; font-weight: bold; flex-shrink: 0; }
        .path-menu li:hover .delete-btn { opacity: 1; }

        @media screen and (max-width: 768px) {
            .path-input input { font-size: 14px; padding: 6px 28px 6px 8px; }
            button { font-size: 14px; padding: 6px 10px; touch-action: manipulation; }
            input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
            .small-button { font-size: 12px; padding: 4px 8px; }
            .file-item label { font-size: 14px; cursor: pointer; }
        }

        /* =====================================================================
           Confirm / Rename / Delete dialog
           ===================================================================== */
        .confirm-dialog-overlay {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 2300;
        }
        .confirm-dialog-overlay > .backdrop {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.5);
        }
        .confirm-dialog {
            position: relative;
            width: min(460px, 90vw);
            background: var(--color-canvas-default);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(27,31,36,0.2);
            overflow: hidden;
            display: flex; flex-direction: column;
        }
        .confirm-dialog header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--color-border-muted);
        }
        .confirm-dialog header h3 {
            margin: 0; font-size: 16px; font-weight: 600;
        }
        .confirm-dialog header button {
            font-size: 20px; line-height: 1; padding: 4px 8px;
            border-radius: 6px; border: none;
            background: transparent; cursor: pointer;
            color: var(--color-fg-muted);
        }
        .confirm-dialog header button:hover { background: var(--color-canvas-subtle); }
        .confirm-dialog .body { padding: 20px; }
        .confirm-dialog .body p { margin: 0 0 16px; color: var(--color-fg-default); line-height: 1.5; }
        .confirm-dialog .body input {
            width: 100%; padding: 5px 12px;
            border: 1px solid var(--color-border-default);
            border-radius: 6px; font-size: 14px;
        }
        .confirm-dialog footer {
            display: flex; gap: 8px; justify-content: flex-end;
            padding: 16px 20px;
            border-top: 1px solid var(--color-border-muted);
        }
        .confirm-dialog footer button {
            padding: 5px 16px; border-radius: 6px;
            font-size: 14px; font-weight: 500; cursor: pointer;
        }
        .confirm-dialog footer button.cancel {
            background: var(--color-neutral-btn);
            border-color: var(--color-neutral-btn-border);
            color: var(--color-fg-default);
        }
        .confirm-dialog footer button.cancel:hover {
            background: var(--color-neutral-btn-hover);
        }
        .confirm-dialog footer button.primary {
            background: var(--color-success-btn);
            border-color: rgba(31,35,40,0.15);
            color: #ffffff;
        }
        .confirm-dialog footer button.primary:hover:not(:disabled) {
            background: var(--color-success-btn-hover);
        }
        .confirm-dialog footer button.danger {
            background: var(--color-danger-emphasis);
            border-color: rgba(31,35,40,0.15);
            color: #ffffff;
        }
        .confirm-dialog footer button.danger:hover:not(:disabled) {
            background: #a40e26;
        }
        .confirm-dialog footer button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* =====================================================================
           Notification overlay
           ===================================================================== */
        .notification-overlay {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 1200;
        }
        .notification-overlay .backdrop {
            position: absolute; inset: 0; background: rgba(0,0,0,0.5);
        }
        .notification-overlay .dialog {
            position: relative;
            max-width: 90%; max-height: 90%; min-width: 468px;
            background: var(--color-canvas-default);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(27,31,36,0.2);
            overflow: hidden;
            display: flex; flex-direction: column;
            z-index: 1201;
        }
        .notification-overlay .dialog-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--color-border-muted);
        }
        .notification-overlay .dialog-header-title {
            font-weight: 600; font-size: 14px;
        }
        .notification-overlay .dialog-body {
            padding: 12px 16px; overflow: auto; flex: 1;
            background: var(--color-canvas-default);
        }
        .notification-overlay .dialog-body pre {
            white-space: pre-wrap; word-break: break-word;
            font-family: var(--font-mono); font-size: 13px;
            margin: 0; padding: 12px;
            background: var(--color-canvas-subtle);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            color: var(--color-fg-default);
        }

        /* =====================================================================
           List Picker dialog
           ===================================================================== */
        .list-picker-dialog {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 1250;
        }
        .list-picker-dialog .backdrop {
            position: absolute; inset: 0; background: rgba(0,0,0,0.5);
        }
        .list-picker-dialog .dialog {
            position: relative;
            width: min(520px, 95vw);
            background: var(--color-canvas-default);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(27,31,36,0.2);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .list-picker-dialog header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--color-border-muted);
        }
        .list-picker-dialog header .title { font-weight: 600; }
        .list-picker-dialog .body { padding: 14px 16px; overflow: auto; max-height: 70vh; }
        .list-picker-dialog footer {
            display: flex; gap: 8px; justify-content: flex-end;
            padding: 12px 16px;
            border-top: 1px solid var(--color-border-muted);
        }

        /* =====================================================================
           Login dialog
           ===================================================================== */
        .login-overlay {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
        }
        body.auth-required .mobile-menu-btn { display: none; }
        body.auth-required .toast-container { display: none; }
        body.auth-checking #app { opacity: 0.3; pointer-events: none; }
        body.auth-checking::before {
            content: 'Loading...'; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 9998;
            font-size: 14px; color: var(--color-fg-muted);
        }
        .login-dialog {
            background: var(--color-canvas-default);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(27,31,36,0.3);
            width: min(440px, 90vw);
            overflow: hidden;
        }
        .login-dialog header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--color-border-muted);
        }
        .login-dialog header h2 {
            margin: 0; font-size: 20px; font-weight: 600;
            color: var(--color-fg-default);
        }
        .login-dialog .body { padding: 20px 24px; }
        .login-dialog .form-group { margin-bottom: 16px; }
        .login-dialog .form-group label {
            display: block; margin-bottom: 6px;
            font-weight: 600; font-size: 14px;
            color: var(--color-fg-default);
        }
        .login-dialog .form-group input {
            width: 100%; padding: 5px 12px;
            border: 1px solid var(--color-border-default);
            border-radius: 6px; font-size: 14px;
        }
        .login-dialog .error-message {
            padding: 8px 12px;
            background: var(--color-danger-subtle);
            border: 1px solid rgba(255,129,130,0.4);
            border-radius: 6px;
            color: var(--color-danger-fg);
            margin-bottom: 16px; font-size: 14px;
        }
        .login-dialog footer {
            padding: 12px 24px;
            border-top: 1px solid var(--color-border-muted);
            display: flex; justify-content: flex-end;
        }
        .login-dialog footer button {
            padding: 5px 20px;
            background: var(--color-success-btn);
            border-color: rgba(31,35,40,0.15);
            color: #ffffff;
            font-weight: 500;
        }
        .login-dialog footer button:hover:not(:disabled) {
            background: var(--color-success-btn-hover);
        }
        .login-dialog footer button:disabled {
            opacity: 0.5; cursor: not-allowed;
        }


    </style>
</head>
<body>
    <div id="app">
        <!-- Mobile menu toggle -->
        <mobile-menu-button
            :is-open="mobileMenuOpen"
            @toggle="toggleMobileMenu"
        ></mobile-menu-button>

        <!-- Mobile overlay -->
        <mobile-overlay
            :show="mobileMenuOpen"
            @close="closeMobileMenu"
        ></mobile-overlay>

        <div class="left-pane h-100vh" @click="expandPanes"
            :class="{ 'mobile-open': mobileMenuOpen }"
            :style="{ '--left-width': leftWidth + 'px' }"
        >
            <div class="left-pane__content">
                <div class="flex-first">
                    <path-input
                        v-model="directoryPath"
                        :recent-paths="recentPaths"
                        placeholder="Enter directory path"
                        @delete-recent-path="requestDeleteRecentPath"
                    ></path-input>
                    <button @click="analyzeDirectory" class="btn-primary" style="margin-left:6px;"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M.146 13.646a.5.5 0 0 0 .707.707L5.207 10l1.5 1.5-4.353 4.354a.5.5 0 0 0 .707.707L7.414 12l1.086 1.086L4.854 16.5H16V4.854L9.5 11.354l-1.086-1.085L12.354 6.2A6 6 0 1 0 .146 13.646ZM6 10a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z"/></svg>Analyze</button>
                </div>

                <div v-if="files.length > 0" class="file-list">
                    <h2 style="font-size: 17px;">Select files to view</h2>
                    <div class="flex">
                        <input-clearable
                            v-model="filterKeyword"
                            placeholder="Filter by keywords, ex: foo -bar"
                            class="flex-1"
                        ></input-clearable>
                        <button @click="clearLeftPane" style="margin-left: 5px;">Clear</button>
                    </div>
                    <div v-for="file in filteredFiles" :key="file.path" class="file-item" :class="{directory: file.type == 'directory'}">
                        <input v-if="file.type === 'directory'"
                               type="checkbox"
                               :id="file.path"
                               :value="file.path"
                               :checked="selectedFiles.includes(file.path)"
                               @change="toggleDirectorySelection(file.path, $event.target.checked)" />
                        <input v-else
                               type="checkbox"
                               :id="file.path"
                               :value="file.path"
                               v-model="selectedFiles" />
                        <label :for="file.path">{{ getRelativePath(file.path) }}</label>
                    </div>
                    <div class="directory-tree">
                        <h3>Directory Structure:</h3>
                        <pre>{{ renderDirectoryTree(filteredFiles) }}</pre>
                    </div>
                </div>
            </div>

            <!-- Resize handle for LEFT pane (outside scroll area) -->
            <resize-handle
                v-model="leftWidth"
                :min="minLeft"
                :get-max="computeMaxLeft"
                :reset-to="DEFAULT_LEFT"
            ></resize-handle>
        </div>

        <div class="middle-pane flex-col h-100vh" :style="{ '--middle-width': middleWidth + 'px' }">
            <!-- Controls header row -->
            <div class="middle-pane__controls">
                <div class="controls-row gap-8">
                    <button @click="viewFiles"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M8 2c1.981 0 3.671.992 4.933 2.078 1.27 1.091 2.187 2.345 2.637 3.023a1.62 1.62 0 0 1 0 1.798c-.45.678-1.367 1.932-2.637 3.023C11.671 13.008 9.981 14 8 14c-1.981 0-3.671-.992-4.933-2.078C1.797 10.83.88 9.576.43 8.898a1.62 1.62 0 0 1 0-1.798c.45-.677 1.367-1.931 2.637-3.022C4.329 2.992 6.019 2 8 2ZM1.679 7.932a.12.12 0 0 0 0 .136c.411.622 1.241 1.75 2.366 2.717C5.176 11.758 6.527 12.5 8 12.5c1.473 0 2.824-.742 3.955-1.715 1.125-.967 1.955-2.095 2.366-2.717a.12.12 0 0 0 0-.136c-.411-.622-1.241-1.75-2.366-2.717C10.824 4.242 9.473 3.5 8 3.5c-1.473 0-2.824.742-3.955 1.715-1.125.967-1.955 2.095-2.366 2.717ZM8 10a2 2 0 1 1-.001-3.999A2 2 0 0 1 8 10Z"/></svg>View</button>
                    <button @click="viewFilesOutline"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M2 4h12v1.5H2V4Zm0 3.5h12V9H2V7.5Zm0 3.5h12v1.5H2V11Z"/></svg>Outline</button>
                    <button v-if="!hasCheckedVisibleFiles" @click="checkAllFiles"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M2.5 1.75v11.5c0 .138.112.25.25.25h3.17a.75.75 0 0 1 0 1.5H2.75A1.75 1.75 0 0 1 1 13.25V1.75C1 .784 1.784 0 2.75 0h7.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v2.585a.75.75 0 0 1-1.5 0V4.664l-2.914-2.914a.25.25 0 0 0-.177-.073ZM15.28 9.22a.75.75 0 0 1 0 1.06l-4.5 4.5a.75.75 0 0 1-1.06 0l-2-2a.749.749 0 0 1 .326-1.275.749.749 0 0 1 .734.215l1.47 1.47 3.97-3.97a.75.75 0 0 1 1.06 0Z"/></svg>Check all</button>
                    <button v-if="hasCheckedVisibleFiles" @click="clearCheckedFiles"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M1 2.75C1 1.784 1.784 1 2.75 1h10.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0 1 13.25 15H2.75A1.75 1.75 0 0 1 1 13.25Zm1.75-.25a.25.25 0 0 0-.25.25v10.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25V2.75a.25.25 0 0 0-.25-.25Z"/></svg>Un-check</button>
                    <button @click="downloadFiles"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/><path d="M7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.97a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.779a.749.749 0 1 1 1.06-1.06l1.97 1.97Z"/></svg>Download</button>
                    <div class="flex-1"></div>
                    <button @click="toggleDarkMode"
                            class="dark-mode-toggle"
                            :title="darkMode ? 'Switch to light mode' : 'Switch to dark mode'">
                        <svg v-if="darkMode" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/>
                            <line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                        <svg v-else viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                    <button v-if="collapseLevel < 2" @click="collapseLeftPanes" class="mobile-hidden" title="Collapse pane"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px"><path d="M7.78 12.53a.75.75 0 0 1-1.06 0L2.47 8.28a.75.75 0 0 1 0-1.06l4.25-4.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042L4.81 7h7.44a.75.75 0 0 1 0 1.5H4.81l2.97 2.97a.75.75 0 0 1 0 1.06Z"/></svg></button>
                    <button v-if="authUsername" @click="handleLogout"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M2 2.75C2 1.784 2.784 1 3.75 1h2.5a.75.75 0 0 1 0 1.5h-2.5a.25.25 0 0 0-.25.25v10.5c0 .138.112.25.25.25h2.5a.75.75 0 0 1 0 1.5h-2.5A1.75 1.75 0 0 1 2 13.25Zm10.44 4.5-1.97-1.97a.749.749 0 0 1 .326-1.275.749.749 0 0 1 .734.215l3.25 3.25a.749.749 0 0 1 0 1.06l-3.25 3.25a.749.749 0 0 1-1.275-.326.749.749 0 0 1 .215-.734l1.97-1.97H6.75a.75.75 0 0 1 0-1.5Z"/></svg>Logout</button>
                </div>
                <!-- Search row -->
                <div class="controls-row gap-8">
                    <input-clearable
                        v-model="searchQuery"
                        placeholder="Search for"
                        class="flex-1"
                        @enter="runSearch"
                    ></input-clearable>
                    <button @click="runSearch" style="width: 90px;"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/></svg>Search</button>
                </div>
                <!-- Replace row -->
                <div class="controls-row gap-8">
                    <input-clearable
                        v-model="replaceQuery"
                        placeholder="Replace with"
                        class="flex-1"
                        @enter="runReplace"
                    ></input-clearable>
                    <button @click="runReplace" style="width: 90px;"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M11.013 1.427a1.75 1.75 0 0 1 2.474 0l1.086 1.086a1.75 1.75 0 0 1 0 2.474l-8.61 8.61c-.35.354-.809.575-1.298.6l-3.507.258a.75.75 0 0 1-.811-.811l.258-3.507a1.748 1.748 0 0 1 .6-1.298l8.61-8.61Zm1.414 1.06a.25.25 0 0 0-.354 0L10.811 3.75l1.439 1.44 1.263-1.263a.25.25 0 0 0 0-.354Zm-1.62 3.232L9.369 4.28 4.537 9.11l1.44 1.44Zm-7.517 3.43L3.61 10.87l-.899 3.127Z"/></svg>Replace</button>
                </div>
                <!-- Save to / Load from lists -->
                <div class="controls-row gap-8">
                    <button @click="openSaveListDialog"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M0 2.75C0 1.784.784 1 1.75 1h12.5c.966 0 1.75.784 1.75 1.75v2.19c0 .727-.52 1.33-1.25 1.5v6.81a.75.75 0 0 1-.75.75H1.75a.75.75 0 0 1-.75-.75V6.44C.52 6.27 0 5.667 0 4.94Zm1.5 3.75v6h13v-6Zm13-1.5V2.75a.25.25 0 0 0-.25-.25H1.75a.25.25 0 0 0-.25.25v2.25ZM8 5.5h4v1.5H8Z"/></svg>Save</button>
                    <button @click="openLoadFromListDialog"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M2.8 2.06A1.75 1.75 0 0 1 4.41 1h7.18c.7 0 1.333.417 1.61 1.06l2.74 6.395A1.75 1.75 0 0 1 16 9.07V13.25A1.75 1.75 0 0 1 14.25 15H1.75A1.75 1.75 0 0 1 0 13.25V9.07c0-.2.033-.398.06-.575ZM4.41 2.5a.25.25 0 0 0-.23.152L1.5 9h3.27a.75.75 0 0 1 .75.75 2.25 2.25 0 0 0 4.5 0 .75.75 0 0 1 .75-.75H14.5l-2.68-6.35a.25.25 0 0 0-.23-.15ZM1.5 10.5v2.75c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25V10.5Z"/></svg>Load</button>
                    <button @click="clearSelectedFiles"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M2.343 13.657A8 8 0 1 1 13.658 2.343 8 8 0 0 1 2.343 13.657ZM6.03 4.97a.751.751 0 0 0-1.042.018.751.751 0 0 0-.018 1.042L6.94 8 4.97 9.97a.749.749 0 0 0 .326 1.275.749.749 0 0 0 .734-.215L8 9.06l1.97 1.97a.749.749 0 0 0 1.275-.326.749.749 0 0 0-.215-.734L9.06 8l1.97-1.97a.749.749 0 0 0-.326-1.275.749.749 0 0 0-.734.215L8 6.94Z"/></svg>Clear</button>
                    <div class="flex-1"></div>
                    <button @click="openSelectedTree"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="M9.5 3.25a2.25 2.25 0 1 1 3 2.122V6A2.5 2.5 0 0 1 10 8.5H6a1 1 0 0 0-1 1v1.128a2.251 2.251 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.5 0v1.836A2.493 2.493 0 0 1 6 7h4a1 1 0 0 0 1-1v-.628A2.25 2.25 0 0 1 9.5 3.25Zm-6 0a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0Zm8.25-.75a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5ZM4.25 12a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Z"/></svg>Tree</button>
                    <button @click="openLinksDialog"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;margin-right:4px"><path d="m7.775 3.275 1.25-1.25a3.5 3.5 0 1 1 4.95 4.95l-2.5 2.5a3.5 3.5 0 0 1-4.95 0 .751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018 2 2 0 0 0 2.83 0l2.5-2.5a2 2 0 0 0-2.83-2.83l-1.25 1.25a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042Zm-4.69 9.64a2 2 0 0 0 2.83 0l1.25-1.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042l-1.25 1.25a3.5 3.5 0 1 1-4.95-4.95l2.5-2.5a3.5 3.5 0 0 1 4.95 0 .751.751 0 0 1-.018 1.042.751.751 0 0 1-1.042.018 2 2 0 0 0-2.83 0l-2.5 2.5a2 2 0 0 0 0 2.83Z"/></svg>Links</button>
                </div>
                <div style="padding: 4px 0 2px 0;">
                    <input-clearable
                        v-model="middlePaneFilter"
                        placeholder="Filter selected files"
                        class="flex-1"
                    ></input-clearable>
                </div>
            </div>

            <div class="selected-files">
                <ul>
                    <li v-for="item in filteredMiddlePaneItems" :key="item.path">
                        <div class="flex">
                            <!-- Checkbox cho directory -->
                            <input v-if="item.type === 'directory'"
                                   type="checkbox"
                                   :id="'middle-dir-' + item.path"
                                   :value="item.path"
                                   :checked="isDirectoryCheckedInMiddle(item.path)"
                                   @change="toggleDirectoryCheckInMiddle(item.path, $event.target.checked)" />

                            <!-- Checkbox cho file -->
                            <input v-else
                                   type="checkbox"
                                   :id="'view-' + item.path"
                                   :value="item.path"
                                   v-model="checkedFiles" />

                            <!-- Label với style khác cho directory -->
                            <label :for="item.type === 'directory' ? 'middle-dir-' + item.path : 'view-' + item.path"
                                   :class="{ 'directory': item.type === 'directory' }">
                                {{ getRelativePath(item.path) }}
                            </label>

                            <!-- Actions chỉ cho files -->
                            <template v-if="item.type === 'file'">
                                <split-button
                                    :primary-label="kindOf(item.path) === 'text' ? 'View' : 'Download'"
                                    :items="getMenuItems(item.path)"
                                    @primary="onPrimary(item.path)"
                                ></split-button>
                                <button @click="removeSelectedFile(item.path)">x</button>
                            </template>

                            <!-- Remove button cho directories -->
                            <button v-else @click="removeSelectedFile(item.path)" style="margin-left: auto;">x</button>
                        </div>

                        <!-- Block list chỉ cho files -->
                        <div v-if="item.type === 'file' && expandedFiles[item.path]" class="block-list">
                            <div v-for="block in expandedFiles[item.path]" :key="block.offset"
                                 class="block-item" :class="['level-' + block.parentOffsets.length]">
                                <input type="checkbox"
                                       :id="'block-' + item.path + '-' + block.offset"
                                       :value="block.offset"
                                       v-model="checkedContentBlocks[item.path]"
                                       @change="onClickContentBlock(item.path, block)" />
                                <label :for="'block-' + item.path + '-' + block.offset">{{ getBlockName(block) }}</label>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
            <!-- Resize handle -->
            <resize-handle
                v-model="middleWidth"
                :min="minMiddle"
                :get-max="computeMaxMiddle"
                :reset-to="DEFAULT_MIDDLE"
            ></resize-handle>
        </div>

        <div v-if="editingFile || searchResult !== null || replaceResult !== null || (mergeContent && mergeContent.length)" class="right-pane h-100vh">
            <div class="file-content-wrapper">
                <button v-if="!editingFile && !searchResult && !replaceResult" @click="downloadMergeContent" class="copy" style="right: 70px;">Download</button>
                <button v-if="!editingFile && !searchResult && !replaceResult" @click="copyMergeContent" class="copy">Copy</button>

                <ace-editor v-if="editingFile" v-model="editingContent" :path="editingFile" @save="saveContent"></ace-editor>

                <search-results
                    v-else-if="searchResult !== null"
                    :data="searchResult"
                    :base-paths="recentPaths"
                    :query="searchQuery"
                    :case-sensitive="true"
                    :use-regex="false"
                    @open="viewSingleFile">
                </search-results>

                <replace-results
                    v-else-if="replaceResult !== null"
                    :data="replaceResult"
                    :query="searchQuery"
                    :replacement="replaceQuery"
                    :to-rel="getRelativePath"
                    @open-file="viewSingleFile">
                </replace-results>

                <div v-else class="file-content" contenteditable="true">{{ mergeContent }}</div>
            </div>
        </div>

        <toast-viewer></toast-viewer>

        <notification-viewer default-title="Notification"></notification-viewer>

        <list-picker-dialog
            v-if="listDialog.open"
            :mode="listDialog.mode"
            :lists="fileLists"
            :allow-create="listDialog.mode === 'save'"
            :confirm-label="listDialog.mode === 'save' ? 'Save' : 'Load'"
            @confirm="handleListConfirm"
            @cancel="closeListDialog"
            @delete-list="handleListDelete"
        ></list-picker-dialog>

        <rename-dialog
            v-if="renameDialog.open"
            :file-path="renameDialog.filePath"
            @confirm="handleRenameConfirm"
            @cancel="renameDialog.open = false"
        ></rename-dialog>

         <delete-confirm-dialog
            v-if="deleteDialog.open"
            title="Delete file"
            :message="deleteDialog.message"
            @confirm="handleDeleteConfirm"
            @cancel="deleteDialog.open = false"
        ></delete-confirm-dialog>

        <delete-confirm-dialog
            v-if="deleteRecentPathDialog.open"
            title="Delete recent path"
            :message="deleteRecentPathDialog.message"
            @confirm="handleDeleteRecentPathConfirm"
            @cancel="deleteRecentPathDialog.open = false"
        ></delete-confirm-dialog>

        <links-dialog
            v-if="linksDialog.open"
            :open="linksDialog.open"
            :mode="linksDialog.mode"
            :links="linksDialog.links"
            :loading="linksDialog.loading"
            @update:mode="(mode) => linksDialog.mode = mode"
            @close="closeLinksDialog"
            @copy="handleLinksCopy"
        ></links-dialog>

        <!-- Login Dialog -->
        <login-dialog
            v-if="showLoginDialog"
            @login-success="handleLoginSuccess"
        ></login-dialog>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.2/ace.min.js"></script>

    <script>
        const { ref, reactive, computed, watch, onMounted, onUnmounted } = Vue;

        window.eventBus = (() => {
              const listeners = new Map();
              return {
                  $on(event, cb) {
                      if (!listeners.has(event)) listeners.set(event, new Set());
                      listeners.get(event).add(cb);
                  },
                  $off(event, cb) {
                      listeners.get(event)?.delete(cb);
                  },
                  $emit(event, payload) {
                      listeners.get(event)?.forEach(fn => {
                          try { fn(payload); } catch (e) { console.error(e); }
                      });
                  }
              };
          })();

        function notify(payload) {
            // payload: string | { title?: string, message?: string, level?: 'info'|'success'|'warn'|'error' }
            window.eventBus.$emit('notification', payload);
        }

        function toast(payload) {
            // payload: string | { title?: string, message?: string, level?: 'info'|'success'|'warn'|'error', timeoutMs?: number }
            window.eventBus.$emit('toast', payload);
        }

        function formatAxiosError(e) {
            const status = e?.response?.status;
            const msg = e?.response?.data?.message || e?.message || 'Unknown error';
            return status ? `[${status}] ${msg}` : msg;
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        // --- helpers for file types ---
        const IMG_EXTS  = ['.png','.jpg','.jpeg','.gif','.webp','.bmp','.svg'];
        const PDF_EXTS  = ['.pdf'];
        const AUDIO_EXTS= ['.mp3','.wav','.ogg','.m4a'];
        const VIDEO_EXTS= ['.mp4','.webm','.ogv'];

        function extOf(path){ const m=path.toLowerCase().match(/\.[^.]+$/); return m?m[0]:''; }
        function isTextFile(path){ return kindOf(path) === 'text'; }
        function kindOf(path){
            const e = extOf(path);
            if (IMG_EXTS.includes(e))   return 'image';
            if (PDF_EXTS.includes(e))   return 'pdf';
            if (AUDIO_EXTS.includes(e)) return 'audio';
            if (VIDEO_EXTS.includes(e)) return 'video';
            return 'text';
        }

        const ToastViewer = {
            template: `
                <div class="toast-container" aria-live="polite" aria-atomic="true">
                    <div v-for="t in toasts" :key="t.id" class="toast" :class="t.level">
                        <div style="display:flex; flex-direction:column; gap:2px;">
                            <div class="title">{{ t.title }}</div>
                            <div class="msg">{{ t.message }}</div>
                        </div>
                        <button class="close" aria-label="Close" @click="dismiss(t.id)">×</button>
                    </div>
                </div>
            `,
            data(){ return { toasts: [] }; },
            methods:{
                handleToast(payload){
                    const id = Date.now() + Math.random();
                    const p = typeof payload === 'string'
                        ? { title:'Notification', message:payload, level:'info' }
                        : { title: payload?.title || 'Notification',
                            message: payload?.message || payload?.text || '',
                            level: payload?.level || 'info',
                            timeoutMs: payload?.timeoutMs };
                    const item = { id, ...p };
                    this.toasts.push(item);
                    const ttl = Number.isFinite(p.timeoutMs) ? p.timeoutMs : 2500;
                    setTimeout(()=>this.dismiss(id), ttl);
                },
                dismiss(id){ this.toasts = this.toasts.filter(t => t.id !== id); }
            },
            mounted(){ window.eventBus.$on('toast', this.handleToast); },
            beforeUnmount(){ window.eventBus.$off('toast', this.handleToast); }
        };

        const NotificationViewer = {
            props: {
                defaultTitle: {
                    type: String,
                    default: 'Notification'
                }
            },
            template: `
                <div v-if="open" class="notification-overlay" @click.self="close" role="dialog" aria-modal="true" :aria-label="title">
                    <div class="backdrop"></div>
                    <div class="dialog">
                        <header class="dialog-header">
                            <div class="dialog-header-title">{{ title }}</div>
                            <button @click="close" aria-label="Close" style="font-size:20px; line-height:1; padding:4px 8px; border-radius:6px; border:1px solid var(--color-border-default); background:transparent; cursor:pointer; color:var(--color-fg-muted);">×</button>
                        </header>
                        <div class="dialog-body">
                            <pre v-text="content"></pre>
                        </div>
                    </div>
                </div>
            `,
            data() {
                return {
                    open: false,
                    title: this.defaultTitle,
                    content: ''
                };
            },
            methods: {
                handleNotification(payload) {
                    if (typeof payload === 'string') {
                        this.title = this.defaultTitle;
                        this.content = payload;
                    } else {
                        this.title = payload?.title || this.defaultTitle;
                        this.content = payload?.message || payload?.text || '';
                    }
                    this.open = !!this.content;
                },
                close() {
                    this.open = false;
                    this.content = '';
                    this.title = this.defaultTitle;
                },
                onKeyDown(e) {
                    if (this.open && (e.key === 'Escape' || e.key === 'Esc')) this.close();
                }
            },
            mounted() {
                window.eventBus.$on('notification', this.handleNotification);
                window.addEventListener('keydown', this.onKeyDown);
                this.$watch(() => this.open, (open) => {
                    document.body.style.overflow = open ? 'hidden' : '';
                });
            },
            beforeUnmount() {
                window.eventBus.$off('notification', this.handleNotification);
                window.removeEventListener('keydown', this.onKeyDown);
                document.body.style.overflow = '';
            }
        };

        const AceEditor = {
            props: ['modelValue', 'path'],
            emits: ['update:modelValue', 'save'],
            setup(props, { emit }) {
                const editorRef = ref(null);
                let aceEditor = null;

                const getFileExtension = (filename) => {
                    return filename.slice((filename.lastIndexOf(".") - 1 >>> 0) + 2);
                };

                const getModeFromExtension = (extension) => {
                    const modeMap = {
                        js: 'javascript', jsx: 'jsx', ts: 'typescript', tsx: 'tsx',
                        html: 'html', css: 'css', php: 'php', py: 'python', rb: 'ruby',
                        java: 'java', c: 'c_cpp', cpp: 'c_cpp', json: 'json', md: 'markdown',
                        sql: 'sql', xml: 'xml', yaml: 'yaml', sh: 'sh', vue: 'vue'
                    };
                    return modeMap[extension.toLowerCase()] || 'text';
                };

                onMounted(() => {
                    ace.config.set('basePath', 'https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.2/');
                    aceEditor = ace.edit(editorRef.value);

                    aceEditor.setOptions({
                        enableBasicAutocompletion: true,
                        enableLiveAutocompletion: true,
                        enableSnippets: true,
                        showLineNumbers: true,
                        tabSize: 4
                    });

                    aceEditor.setTheme("ace/theme/cloud_editor_dark");

                    const extension = getFileExtension(props.path);
                    const mode = getModeFromExtension(extension);
                    aceEditor.session.setMode(`ace/mode/${mode}`);

                    aceEditor.setValue(props.modelValue, -1);

                    aceEditor.on('change', () => { emit('update:modelValue', aceEditor.getValue()); });

                    const handleKeydown = (event) => {
                        if (event.ctrlKey && event.key === 's') {
                            event.preventDefault();
                            emit('save', aceEditor.getValue());
                        }
                    };

                    document.addEventListener('keydown', handleKeydown);

                    onUnmounted(() => {
                        document.removeEventListener('keydown', handleKeydown);
                        aceEditor.destroy();
                    });
                });

                watch(() => props.modelValue, (newValue) => {
                    if (aceEditor && newValue !== aceEditor.getValue()) {
                        aceEditor.setValue(newValue, -1);
                    }
                });

                return { editorRef };
            },
            template: `<div ref="editorRef" class="editor" style="width: 100%; height: 100%;"></div>`
        };

        const SearchResults = {
            props: ['data', 'basePaths', 'query', 'caseSensitive', 'useRegex'],
            emits: ['open'],
            setup(props, { emit }) {
                const collapsed = Vue.ref(new Set());

                const toggle = (path) => {
                    const s = new Set(collapsed.value);
                    s.has(path) ? s.delete(path) : s.add(path);
                    collapsed.value = s;
                };
                const isCollapsed = (path) => collapsed.value.has(path);

                // Rút gọn path theo recent base paths
                const toRel = (fullPath) => {
                    if (!fullPath) return fullPath;
                    for (const base of props.basePaths || []) {
                        if (fullPath.startsWith(base)) {
                            return fullPath.slice(base.length).replace(/^[\/\\]/, '');
                        }
                    }
                    return fullPath;
                };

                const openFile = (path) => emit('open', path);

                // --- Highlight helpers ---
                function escapeHtml(s) {
                    return s
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                }
                function escapeRegex(s) {
                    return s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                }
                function highlightPreview(preview) {
                    if (!props.query) return escapeHtml(preview);

                    // Regex mode: dùng RegExp
                    if (props.useRegex) {
                        const flags = props.caseSensitive ? 'g' : 'gi';
                        let re;
                        try {
                            re = new RegExp(props.query, flags);
                        } catch (e) {
                            // Regex invalid -> fallback literal
                            return highlightLiteral(preview, props.query, props.caseSensitive);
                        }
                        return escapeHtml(preview).replace(
                            new RegExp(props.query, flags),
                            (m) => `<span class="sr-hit">${escapeHtml(m)}</span>`
                        );
                    }

                    // Literal mode
                    return highlightLiteral(preview, props.query, props.caseSensitive);
                }
                function highlightLiteral(preview, needle, caseSensitive) {
                    if (!needle) return escapeHtml(preview);
                    const src = caseSensitive ? preview : preview.toLowerCase();
                    const pat = caseSensitive ? needle : needle.toLowerCase();

                    let out = '';
                    let i = 0;
                    const n = pat.length;
                    if (n === 0) return escapeHtml(preview);

                    while (true) {
                        const p = src.indexOf(pat, i);
                        if (p === -1) {
                            out += escapeHtml(preview.slice(i));
                            break;
                        }
                        out += escapeHtml(preview.slice(i, p));
                        out += `<span class="sr-hit">${escapeHtml(preview.slice(p, p + n))}</span>`;
                        i = p + n;
                    }
                    return out;
                }

                return { toggle, isCollapsed, openFile, toRel, highlightPreview };
            },
            template: `
                <div class="sr-root" style="height:100%; overflow:auto; padding:10px; font-family: 'Roboto Mono', monospace;">
                    <div style="border-bottom: 1px solid gray; padding-bottom: 5px;">Scanned: {{data.summary.scanned}} · Files matched: {{data.summary.matched_files}} · Total occurrences: {{data.summary.total_matches}}</div>

                    <div v-for="file in data.matches" :key="file.path" style="margin-top:12px;">
                        <div style="font-weight:bold">
                            <span style="cursor:pointer; margin-right:6px;" @click="toggle(file.path)">
                                {{ isCollapsed(file.path) ? '[+]' : '[-]' }}
                            </span>
                            <span>File: </span>
                            <a href="javascript:void(0)" @click="openFile(file.path)">{{ toRel(file.path) }}</a>
                        </div>

                        <div v-show="!isCollapsed(file.path)" style="border-left: 1px solid #4c4d4d; margin-left: 13px;">
                            <div v-for="line in file.lines" :key="file.path + ':' + line.line" style="padding-left:8px; margin-bottom:8px;">
                                <div style="display: flex;">
                                    <div>- Line {{line.line}} - </div>
                                    <div style="margin-left: 10px; white-space:pre; overflow:hidden;"
                                         v-html="highlightPreview(line.preview)"></div>
                                </div>
                            </div>
                            <div style="padding-left:8px;">Found {{ file.total }} occurrence<span v-if="file.total > 1">s</span>.</div>
                        </div>
                    </div>
                </div>
            `
        };

        const ReplaceResults = {
            props: {
                data: { type: Object, required: true },
                query: { type: String, required: true },
                replacement: { type: String, required: true },
                toRel: { type: Function, required: true }
            },
            emits: ['open-file'],
            setup(props, { emit }) {
                const collapsed = Vue.reactive(new Set());

                function toggle(path) {
                    if (collapsed.has(path)) collapsed.delete(path); else collapsed.add(path);
                }
                function isCollapsed(path) { return collapsed.has(path); }
                function openFile(path) { emit('open-file', path); }

                // highlight match (literal, case-sensitive; giữ nguyên style Search)
                function highlightPreview(text) {
                    if (!props.query) return escapeHtml(text);
                    const pattern = escapeRegExp(props.query);
                    const re = new RegExp(pattern, 'g');
                    return escapeHtml(text).replace(
                        new RegExp(pattern, 'g'),
                        (m) => `<span style="color:#c00; font-weight:bold;">${escapeHtml(m)}</span>`
                    );
                }

                // render preview sau khi replace (literal, case-sensitive)
                function replacePreview(text) {
                    if (!props.query) return escapeHtml(text);
                    const pattern = escapeRegExp(props.query);
                    return escapeHtml(text).replace(
                        new RegExp(pattern, 'g'),
                        () => `<span>${escapeHtml(props.replacement)}</span>`
                    );
                }

                function escapeHtml(s) {
                    return String(s)
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                }
                function escapeRegExp(s) {
                    return s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                }

                return { toggle, isCollapsed, openFile, highlightPreview, replacePreview };
            },
            template: `
                <div class="sr-root" style="height:100%; overflow:auto; padding:10px; font-family: 'Roboto Mono', monospace;">
                    <div style="border-bottom: 1px solid gray; padding-bottom: 5px;">
                        Scanned: {{data.summary.scanned}} · Files matched: {{data.summary.matched_files}} · Total occurrences: {{data.summary.total_matches}}
                    </div>

                    <div v-for="file in data.matches" :key="file.path" style="margin-top:12px;">
                        <div style="font-weight:bold">
                            <span style="cursor:pointer; margin-right:6px;" @click="toggle(file.path)">
                                {{ isCollapsed(file.path) ? '[+]' : '[-]' }}
                            </span>
                            <span>File: </span>
                            <a href="javascript:void(0)" @click="openFile(file.path)">{{ toRel(file.path) }}</a>
                        </div>

                        <div v-show="!isCollapsed(file.path)" style="border-left: 1px solid #4c4d4d; margin-left: 13px;">
                            <div v-for="line in file.lines" :key="file.path + ':' + line.line" style="padding-left:8px; margin-bottom:8px;">
                                <div style="display:flex;">
                                    <div>- Line {{line.line}} -</div>
                                    <div style="margin-left:10px; white-space:pre; overflow:auto;" v-html="highlightPreview(line.preview)"></div>
                                </div>
                                <div style="display:flex;">
                                    <div>- Replaced by -</div>
                                    <div style="margin-left:10px; white-space:pre; overflow:auto;" v-html="replacePreview(line.preview)"></div>
                                </div>
                            </div>
                            <div style="padding-left:8px;">Found {{ file.total }} occurrence<span v-if="file.total > 1">s</span>.</div>
                        </div>
                    </div>
                </div>
            `
        };

        const RenameDialog = {
            name: 'RenameDialog',
            props: {
                filePath: { type: String, required: true }
            },
            emits: ['confirm', 'cancel'],
            setup(props, { emit }) {
                const currentName = ref('');
                const newName = ref('');
                const inputRef = ref(null);

                onMounted(() => {
                    const name = props.filePath.split('/').pop();
                    currentName.value = name;
                    newName.value = name;
                    Vue.nextTick(() => {
                        if (inputRef.value) {
                            inputRef.value.focus();
                            inputRef.value.select();
                        }
                    });
                    document.addEventListener('keydown', onKeyDown);
                });

                onUnmounted(() => {
                    document.removeEventListener('keydown', onKeyDown);
                });

                const canConfirm = computed(() => {
                    const val = (newName.value || '').trim();
                    return val && val !== currentName.value;
                });

                function onKeyDown(e) {
                    if (e.key === 'Escape') emit('cancel');
                    if (e.key === 'Enter' && canConfirm.value) doConfirm();
                }

                function doConfirm() {
                    if (!canConfirm.value) return;
                    emit('confirm', newName.value.trim());
                }

                function doCancel() {
                    emit('cancel');
                }

                return { newName, inputRef, canConfirm, doConfirm, doCancel };
            },
            template: `
                <div class="confirm-dialog-overlay" role="dialog" aria-modal="true">
                    <div class="backdrop" @click="doCancel"></div>
                    <div class="confirm-dialog">
                        <header>
                            <h3>Rename file</h3>
                            <button @click="doCancel" aria-label="Close">×</button>
                        </header>
                        <div class="body">
                            <p>Enter new file name:</p>
                            <input ref="inputRef" v-model="newName" type="text" @keydown.enter="doConfirm" @keydown.esc="doCancel" />
                        </div>
                        <footer>
                            <button class="cancel" @click="doCancel">Cancel</button>
                            <button class="primary" :disabled="!canConfirm" @click="doConfirm">Rename</button>
                        </footer>
                    </div>
                </div>
            `
        };

        const DeleteConfirmDialog = {
            name: 'DeleteConfirmDialog',
            props: {
                title: { type: String, default: 'Delete confirmation' },
                message: { type: String, required: true }
            },
            emits: ['confirm', 'cancel'],
            template: `
                <div class="confirm-dialog-overlay" role="dialog" aria-modal="true">
                    <div class="backdrop" @click="$emit('cancel')"></div>
                    <div class="confirm-dialog">
                        <header>
                            <h3>{{ title }}</h3>
