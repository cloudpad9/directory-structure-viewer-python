<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Directory Structure Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap">
    <style>
        body {
            font-family: Helvetica, Arial, Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            overflow: hidden;
        }
        .flex,
        .flex-first,
        .flex-last {
            display: flex;
        }
        .flex-col {
            display: flex;
            flex-direction: column;
        }
        .flex-first > *:first-child,
        .flex-last > *:last-child {
            flex: 1;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
        }
        .flex-1 { flex: 1; }
        .gap-5 { gap: 5px; }
        .gap-8 { gap: 8px; }
        .h-100vh { height: 100vh; }

        /* Base styles */
        #app {
            display: flex;
            flex: 1;
            flex-direction: row;
            overflow: hidden;
            height: 100vh;
        }

        /* Left pane */
        .left-pane {
            flex: 0 0 var(--left-width, 400px);
            padding: 10px;
            background-color: #f5f5f5;
            border-right: 1px solid #ddd;
            box-sizing: border-box;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        /* Middle pane */
        .middle-pane {
            flex: 0 0 var(--middle-width, 460px);
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }
        /* Middle pane resize handle */
        .resize-handle{
            position:absolute; top:0; right:-4px; width:8px; height:100%;
            cursor: col-resize; z-index: 50; touch-action: none;
        }
        .resize-handle::after{
            content:''; position:absolute; top:0; bottom:0; left:3px; width:2px; background:#ddd;
        }
        .resize-handle:hover::after{ background:#bbb; }
        .collapse-1 .resize-handle, .collapse-2 .resize-handle{ display:none; }
        @media screen and (max-width: 768px){ .resize-handle{ display:none; } }

        /* Right pane */
        .right-pane {
            flex: 1;
            border-left: 1px solid #d9d9d9;
            overflow-y: auto;
            min-width: 0;
        }

        /* Mobile hamburger menu */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 3000;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .mobile-menu-btn span {
            display: block;
            width: 20px;
            height: 2px;
            background: #333;
            margin: 4px 0;
            transition: 0.3s;
            border-radius: 2px;
        }

        /* Responsive breakpoints */
        @media screen and (max-width: 1200px) {
            .left-pane { flex: 0 0 var(--left-width, 300px); }
            .middle-pane { flex: 0 0 var(--middle-width, 360px); }
        }

        @media screen and (max-width: 992px) {
            .left-pane { flex: 0 0 var(--left-width, 280px); }
            .middle-pane { flex: 0 0 var(--middle-width, 320px); }
            .directory-tree {
                display: none;
            }
        }

        @media screen and (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }

            .mobile-hidden {
                display: none;
            }

            #app {
                flex-direction: column;
            }

            .left-pane {
                position: fixed;
                top: 0;
                left: -100%;
                width: 85%;
                max-width: 360px;
                height: 100vh;
                z-index: 2500;
                transition: left 0.3s ease;
                box-shadow: 2px 0 8px rgba(0,0,0,0.15);
                background-color: #f5f5f5;
            }

            .left-pane.mobile-open {
                left: 0;
            }

            /* Hamburger animation when open */
            .mobile-menu-btn.active span:nth-child(1) {
                transform: translateY(6px) rotate(45deg);
            }

            .mobile-menu-btn.active span:nth-child(2) {
                opacity: 0;
            }

            .mobile-menu-btn.active span:nth-child(3) {
                transform: translateY(-6px) rotate(-45deg);
            }

            .left-pane.mobile-open {
                left: 0;
            }

            .middle-pane {
                flex: 1;
                width: 100%;
                max-height: 40vh;
                border-bottom: 1px solid #ddd;
            }

            .right-pane {
                flex: 1;
                width: 100%;
                border-left: none;
                border-top: 1px solid #d9d9d9;
            }

            .selected-files ul li label {
                width: auto;
                max-width: 200px;
            }

            .controls-row {
                flex-wrap: wrap;
            }

            .controls-row button,
            .controls-row input {
                font-size: 14px;
                padding: 6px 10px;
            }
        }

        .clear-button { margin-left: 10px; padding: 2px 8px; font-size: 0.9em; }
        .file-list { margin-top: 20px; }
        .file-item { margin: 5px 0; display: flex; }
        .file-item.directory label { text-decoration: underline; }
        .file-item input[type="checkbox"] { margin-right: 5px; }
        .selected-files { overflow-x: hidden; padding-left: 5px; padding-right: 10px; flex: 1; }
        .selected-files ul { margin: 0; padding: 15px 0; list-style: none; }
        .selected-files ul li {
            margin-bottom: 3px;
            word-break: break-word;
        }
        .selected-files ul li label { flex: 1; width: 295px; white-space: nowrap; }

        .middle-pane__controls {
            background: #fff;
            border-bottom: 1px solid gray;
            padding: 6px 10px;
        }
        .controls-row {
            display: flex;
            align-items: center;
            padding: 4px 0;
            gap: 5px;
        }
        .controls-row label { min-width: 70px; color: #555; }

        .file-content-wrapper { height: 100%; position: relative; }
        .copy { position: absolute; top: 5px; right: 10px; margin: 5px; z-index: 1; }
        .file-content {
            font-family: 'Roboto Mono', monospace;
            white-space: pre-wrap;
            overflow: auto;
            outline: none;
            padding: 0 10px;
            height: 100%;
        }
        textarea {
            width: 100%; height: 100%; border: none; background: #f0f0f0;
            box-sizing: border-box; overflow: auto; resize: none;
            font-size: 14px;
        }
        .block-list { margin-left: 20px; }
        .block-item { margin: 3px 0; }
        .block-item.level-1 { background: #b4dbac; margin-left: 20px; }
        .block-item.level-2 { background: pink; margin-left: 40px; }
        .small-button { margin-left: 5px; font-size: 0.8em; }

        .ace_editor { font: 16px/normal 'Monaco','Menlo','Ubuntu Mono','Consolas','source-code-pro',monospace !important; }

        @media screen and (max-width: 768px) {
            .ace_editor {
                font-size: 14px !important;
            }
            .file-content {
                font-size: 13px;
                padding: 0 5px;
            }
            .sr-root {
                font-size: 13px;
                padding: 0 5px;
            }
            textarea {
                font-size: 13px;
            }
        }

        /* Dark mode styles */
        body.dark-mode {
            background: #202020;
            color: #e0e0e0;
        }
        body.dark-mode .left-pane {
            background-color: #1a1a1a;
            border-right: 1px solid #333333;
        }
        body.dark-mode .middle-pane__controls {
            background: #1a1a1a;
            border-bottom: 1px solid #333333;
        }
        body.dark-mode .right-pane {
            background: #202020;
            border-left: 1px solid #333333;
        }
        body.dark-mode .directory-tree {
            background-color: #1e1e1e;
            border: 1px solid #333333;
            color: #e0e0e0;
        }
        body.dark-mode textarea {
            background: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #333333;
        }
        body.dark-mode textarea:focus {
            outline: 2px solid #3b82f6;
            outline-offset: -1px;
            border-color: #3b82f6;
        }
        body.dark-mode button {
            background: #222222;
            color: #e0e0e0;
            border: 1px solid #404040;
        }
        body.dark-mode button:hover:not(:disabled) {
            background: #333333;
            border-color: #525252;
        }
        body.dark-mode button:active:not(:disabled) {
            background: #1e1e1e;
            border-color: #404040;
        }
        body.dark-mode button:disabled {
            background: #1a1a1a;
            color: #666666;
            border-color: #2a2a2a;
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Primary action buttons - Dark mode */
        body.dark-mode button:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }

        body.dark-mode input {
            background: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #404040;
        }

        body.dark-mode input:hover:not(:disabled) {
            border-color: #525252;
        }
        body.dark-mode input:focus {
            outline: 2px solid #3b82f6;
            outline-offset: -1px;
            border-color: #3b82f6;
            background: #262626;
        }
        body.dark-mode input::placeholder {
            color: #737373;
        }
        body.dark-mode input:disabled {
            background: #1a1a1a;
            color: #525252;
            border-color: #2a2a2a;
        }

        /* Checkbox - Dark mode */
        body.dark-mode input[type="checkbox"] {
            accent-color: #3b82f6;
        }

        /* Links - Dark mode */
        body.dark-mode a {
            color: #60a5fa;
        }
        body.dark-mode a:hover {
            color: #93c5fd;
        }

        /* Resize handle - Dark mode */
        body.dark-mode .resize-handle::after {
            background: #333333;
        }
        body.dark-mode .resize-handle:hover::after {
            background: #525252;
        }

        /* Mobile menu button - Dark mode */
        body.dark-mode .mobile-menu-btn {
            background: #1a1a1a;
            border-color: #404040;
        }
        body.dark-mode .mobile-menu-btn span {
            background: #e0e0e0;
        }

        /* File content - Dark mode */
        body.dark-mode .file-content {
            color: #e0e0e0;
        }

        /* Search results - Dark mode */
        body.dark-mode .sr-root {
            background: #1e1e1e;
            color: #e0e0e0;
        }
        body.dark-mode .sr-path {
            color: #60a5fa;
        }
        body.dark-mode .sr-hit {
            color: #fca5a5;
            background: #7f1d1d;
            padding: 2px 4px;
            border-radius: 2px;
        }

        /* Labels - Dark mode */
        body.dark-mode label {
            color: #e0e0e0;
         }
        /* Dark mode toggle button */
        .dark-mode-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 2px 6px;
            cursor: pointer;
        }
        .dark-mode-toggle svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
        body.dark-mode .dark-mode-toggle svg {
            fill: #ffd700;
            stroke: #ffd700;
        }
        .dark-mode-toggle:hover svg {
            opacity: 0.8;
        }
        /* Toast - Dark mode */
        body.dark-mode .toast {
            background: #1e1e1e;
            border-color: #404040;
            color: #e0e0e0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        body.dark-mode .toast.info {
            border-left-color: #3b82f6;
        }
        body.dark-mode .toast.success {
            border-left-color: #10b981;
        }
        body.dark-mode .toast.warn {
            border-left-color: #f59e0b;
        }
        body.dark-mode .toast.error {
            border-left-color: #ef4444;
        }
        body.dark-mode .toast .close {
            color: #b8b8b8;
        }
        body.dark-mode .toast .close:hover {
            color: #e0e0e0;
        }

        /* Notification dialog - Dark mode */
        body.dark-mode .notification-overlay > div:first-child {
            background: rgba(0,0,0,0.75);
        }
        body.dark-mode .notification-overlay > div:last-child {
            background: #1e1e1e;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }
        body.dark-mode .notification-overlay header {
            border-bottom-color: #333333;
        }
        body.dark-mode .notification-overlay header button {
            background: #262626;
            border-color: #404040;
            color: #e0e0e0;
        }
        body.dark-mode .notification-overlay pre {
            background: #202020;
            color: #e0e0e0;
            border: 1px solid #333333;
        }

        /* Split button menu - Dark mode */
        body.dark-mode .split-button .menu {
            background: #1e1e1e;
            border-color: #404040;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        body.dark-mode .split-button .menu button:hover:not(:disabled) {
            background: #2a2a2a;
        }
        body.dark-mode .split-button .menu button:disabled {
            color: #525252;
        }

        /* Path menu - Dark mode */
        body.dark-mode .path-menu {
            background: #1e1e1e;
            border-color: #404040;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        body.dark-mode .path-menu li button:hover {
            background: #2a2a2a;
        }
        body.dark-mode .path-menu li button:focus-visible {
            background: #1e3a5f;
        }
        body.dark-mode .path-input .drop-btn:hover {
            background: rgba(255,255,255,0.08);
        }

        /* List picker dialog - Dark mode */
        body.dark-mode .notification-overlay footer {
            border-top-color: #333333;
        }
        body.dark-mode .notification-overlay footer button:last-child {
            background: #1e40af;
            border-color: #1e40af;
        }
        body.dark-mode .notification-overlay footer button:last-child:hover:not(:disabled) {
            background: #1e3a8a;
            border-color: #1e3a8a;
        }
        body.dark-mode .notification-overlay footer button:first-child {
            background: #262626;
            border-color: #404040;
        }

        /* Rename & Delete Dialog */
        .confirm-dialog-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2300;
        }
        .confirm-dialog-overlay > .backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
        }
        .confirm-dialog {
            position: relative;
            width: min(460px, 90vw);
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .confirm-dialog header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
        }
        .confirm-dialog header h3 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
        }
        .confirm-dialog header button {
            font-size: 24px;
            line-height: 1;
            padding: 4px 8px;
            border-radius: 4px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: #666;
        }
        .confirm-dialog header button:hover {
            background: #f5f5f5;
            color: #333;
        }
        .confirm-dialog .body {
            padding: 20px;
        }
        .confirm-dialog .body p {
            margin: 0 0 16px 0;
            color: #333;
            line-height: 1.5;
        }
        .confirm-dialog .body input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .confirm-dialog .body input:focus {
            outline: 2px solid #3b82f6;
            outline-offset: -1px;
            border-color: #3b82f6;
        }
        .confirm-dialog footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding: 16px 20px;
            border-top: 1px solid #eee;
        }
        .confirm-dialog footer button {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid;
            transition: all 0.15s;
        }
        .confirm-dialog footer button.cancel {
            background: #fff;
            border-color: #ddd;
            color: #333;
        }
        .confirm-dialog footer button.cancel:hover {
            background: #f5f5f5;
            border-color: #ccc;
        }
        .confirm-dialog footer button.primary {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
        }
        .confirm-dialog footer button.primary:hover:not(:disabled) {
            background: #2563eb;
            border-color: #2563eb;
        }
        .confirm-dialog footer button.danger {
            background: #ef4444;
            border-color: #ef4444;
            color: #fff;
        }
        .confirm-dialog footer button.danger:hover:not(:disabled) {
            background: #dc2626;
            border-color: #dc2626;
        }
        .confirm-dialog footer button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Dark mode for dialogs */
        body.dark-mode .confirm-dialog {
            background: #1e1e1e;
        }
        body.dark-mode .confirm-dialog header {
            border-bottom-color: #333;
        }
        body.dark-mode .confirm-dialog header h3 {
            color: #e0e0e0;
        }
        body.dark-mode .confirm-dialog header button {
            color: #b8b8b8;
        }
        body.dark-mode .confirm-dialog header button:hover {
            background: #2a2a2a;
            color: #e0e0e0;
        }
        body.dark-mode .confirm-dialog .body p {
            color: #e0e0e0;
        }
        body.dark-mode .confirm-dialog .body input {
            background: #2a2a2a;
            border-color: #404040;
            color: #e0e0e0;
        }
        body.dark-mode .confirm-dialog .body input:focus {
            background: #2a2a2a;
            border-color: #3b82f6;
        }
        body.dark-mode .confirm-dialog footer {
            border-top-color: #333;
        }
        body.dark-mode .confirm-dialog footer button.cancel {
            background: #2a2a2a;
            border-color: #404040;
            color: #e0e0e0;
        }
        body.dark-mode .confirm-dialog footer button.cancel:hover {
            background: #333;
            border-color: #525252;
        }
        body.dark-mode .confirm-dialog footer button.primary {
            background: #1e40af;
            border-color: #1e40af;
        }
        body.dark-mode .confirm-dialog footer button.primary:hover:not(:disabled) {
            background: #1e3a8a;
            border-color: #1e3a8a;
        }
        body.dark-mode .confirm-dialog footer button.danger {
            background: #dc2626;
            border-color: #dc2626;
        }
        body.dark-mode .confirm-dialog footer button.danger:hover:not(:disabled) {
            background: #b91c1c;
            border-color: #b91c1c;
        }
        /* Notification overlay - refactored from inline styles */
        .notification-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1200;
        }
        .notification-overlay .backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
        }
        .notification-overlay .dialog {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            min-width: 468px;
            background: #fff;
            border-radius: 2px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            z-index: 1201;
        }
        .notification-overlay .dialog-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
        }
        .notification-overlay .dialog-header-title {
            font-weight: 600;
        }
        .notification-overlay .dialog-body {
            padding: 12px 16px;
            overflow: auto;
            flex: 1;
            background: #fff;
        }
        .notification-overlay .dialog-body pre {
            white-space: pre-wrap;
            word-break: break-word;
            font-family: monospace;
            font-size: 15px;
            margin: 0;
            padding: 8px;
            border-radius: 4px;
        }

        /* Dark mode for notification overlay */
        body.dark-mode .notification-overlay .backdrop {
            background: rgba(0, 0, 0, 0.75);
        }
        body.dark-mode .notification-overlay .dialog {
            background: #1e1e1e;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }
        body.dark-mode .notification-overlay .dialog-header {
            border-bottom-color: #333333;
        }
        body.dark-mode .notification-overlay .dialog-header-title {
            color: #e0e0e0;
        }
        body.dark-mode .notification-overlay .dialog-body {
            background: #1e1e1e;
        }
        body.dark-mode .notification-overlay .dialog-body pre {
            background: #202020;
            color: #e0e0e0;
            border: 1px solid #333333;
        }

        /* Scrollbar - Dark mode (optional, for webkit browsers) */
        body.dark-mode ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        body.dark-mode ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        body.dark-mode ::-webkit-scrollbar-thumb {
            background: #404040;
            border-radius: 6px;
            border: 2px solid #1a1a1a;
        }
        body.dark-mode ::-webkit-scrollbar-thumb:hover {
            background: #525252;
        }
        /* Collapse levels */
        .expand-button { display: none; }
        .collapse-1 .left-pane { flex: 0 0 28px; cursor: pointer; justify-content: center; align-items: center; display: flex; }
        .collapse-1 .left-pane > * { display: none; }
        .collapse-1 .left-pane > .expand-button,
        .collapse-2 .left-pane > .expand-button { display: block; }
        .collapse-2 .middle-pane { flex: 0 0 0; }
        .collapse-2 .middle-pane > * { display: none; }

        .directory-tree { margin-top: 20px; font-family: monospace; font-size: 14px; background-color: #f9f9f9; padding: 10px; border: 1px solid #ddd; }

        @media screen and (max-width: 768px) {
            .collapse-1 .left-pane,
            .collapse-2 .left-pane,
            .collapse-2 .middle-pane {
                position: static;
                flex: initial;
            }
            body.collapse-1,
            body.collapse-2 {
                /* Disable collapse on mobile */
            }
        }

        /* Search Results styles */
        .sr-root {
            height: 100%;
            overflow: auto;
            padding: 0 10px;
            font-family: 'Roboto Mono', monospace;
            font-size: 15px;
            background: #f7f3d6; /* nền vàng nhạt như ảnh */
        }
        .sr-file { margin-top: 12px; }
        .sr-file-head { display: flex; align-items: baseline; gap: 6px; }
        .sr-collapser { width: 28px; cursor: pointer; color: #000; user-select: none; }
        .sr-path { color: #06c; text-decoration: underline; cursor: pointer; }
        .sr-preview { margin-left: 10px; white-space: pre; overflow: hidden; }
        .sr-hit { color: #c00; font-weight: bold; }
        .sr-summary { margin-top: 12px; }

        /* Toast notifications (top-right) */
        .toast-container{
            position:fixed; top:16px; right:16px; z-index:1300;
            display:flex; flex-direction:column; gap:8px;
            pointer-events:none;
        }
        .toast{
            pointer-events:auto;
            display:flex; align-items:flex-start; gap:10px;
            min-width:280px; max-width:420px;
            padding:10px 12px; background:#fff;
            border:1px solid #e5e7eb; border-radius:6px;
            box-shadow:0 10px 20px rgba(0,0,0,0.15);
            animation:toast-in .15s ease;
            word-break: break-word;
        }
        .toast .title{ font-weight:600; margin-right:6px; }
        .toast .msg{ white-space:pre-wrap; word-break:break-word; }
        .toast .close{ margin-left:auto; background:transparent; border:none; cursor:pointer; font-size:16px; line-height:1; }
        .toast.info{ border-left:4px solid #3b82f6; }
        .toast.success{ border-left:4px solid #16a34a; }
        .toast.warn{ border-left:4px solid #f59e0b; }
        .toast.error{ border-left:4px solid #ef4444; }
        @keyframes toast-in{ from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);} }

        @media screen and (max-width: 768px) {
            .toast-container {
                top: 8px;
                right: 8px;
            }
            .toast {
                min-width: 240px;
                max-width: calc(100vw - 32px);
            }
        }

        /* SplitButton */
        .split-button { display:inline-flex; position:relative; margin-left:5px; }
        .split-button .menu{
            position:absolute; top:100%; right:0; z-index:50; min-width:160px;
            margin:0; padding:6px 0; list-style:none;
            background:#fff; border:1px solid #ddd; border-radius:6px;
            box-shadow:0 8px 16px rgba(0,0,0,0.12);
        }
        .split-button .menu button{
            display:block; width:100%; text-align:left;
            border:none; background:transparent; padding:8px 12px; margin:0; cursor:pointer;
        }
        .split-button .small-button {
            margin-left: -1px;
        }
        /* giữ phần .split-button và .menu cũ của anh */
        .split-button .menu { top:auto; bottom:auto; }  /* reset mặc định */
        .split-button .menu.drop-down { top:100%; }
        .split-button .menu.drop-up   { bottom:100%; }

        /* option: giới hạn chiều cao + scroll nếu chật */
        .split-button .menu { max-height: 320px; overflow-y: auto; }

        /* ===== PathInput ===== */
        .path-input { position: relative; display: block; }

        /* hàng chứa input + nút */
        .path-input .row {
            position: relative;
            display: flex;
            align-items: center;
        }

        /* input: chừa chỗ cho nút tam giác */
        .path-input input {
            flex: 1;
            padding-right: 28px;
            box-sizing: border-box;
        }

        /* nút tam giác ▼ đặt absolute trong .row */
        .path-input .drop-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            cursor: pointer;
            line-height: 1;
            font-size: 14px;           /* đủ lớn để bấm */
            width: 22px; height: 22px; /* hit area tối thiểu */
            padding: 0;
            border-radius: 3px;
        }
        .path-input .drop-btn:hover { background: rgba(0,0,0,0.06); }
        .path-input .drop-btn:focus-visible {
            outline: 2px solid #2684ff;
            outline-offset: 1px;
        }

        /* ===== Path menu (teleport to body, position:fixed set bằng inline style) ===== */
        .path-menu {
            position: fixed;           /* tọa độ set bởi JS */
            z-index: 2000;
            margin: 0;
            padding: 6px 0;
            list-style: none;
            min-width: 160px;          /* sẽ bị override bằng minWidth inline theo input */
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.12);
            overflow-y: auto;          /* max-height set inline */
        }

        /* item */
        .path-menu li { margin: 0; }
        .path-menu li button{
            white-space: normal;       /* bỏ nowrap */
            overflow: visible;         /* không cắt */
            text-overflow: clip;       /* không dùng ellipsis */
            overflow-wrap: anywhere;   /* wrap khi cần */
            word-break: break-word;
            line-height: 1.25;
        }

        @media screen and (max-width: 768px) {
            .path-input input {
                font-size: 14px;
                padding: 6px 28px 6px 8px;
            }

            button {
                font-size: 14px;
                padding: 6px 10px;
                touch-action: manipulation;
            }

            input[type="checkbox"] {
                width: 18px;
                height: 18px;
                cursor: pointer;
            }

            .small-button {
                font-size: 12px;
                padding: 4px 8px;
            }

            .file-item label {
                font-size: 14px;
                cursor: pointer;
            }
        }
        .path-menu li button:hover { background: #f2f4f7; }
        .path-menu li button:focus-visible {
            outline: 2px solid #2684ff;
            outline-offset: -2px;
            background: #eef4ff;
        }
        .path-menu li button:disabled {
            color: #999;
            cursor: default;
            background: transparent;
        }

        /* Delete button for recent paths */
        .path-menu li {
            position: relative;
        }
        .path-menu li .path-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .path-menu li .path-item .path-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .path-menu li .delete-btn {
            opacity: 0;
            padding: 2px 6px;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .path-menu li:hover .delete-btn {
            opacity: 1;
        }
        /* tùy chọn: theme tối (nếu body có .dark) */
        .dark .path-menu {
            background: #1f1f1f;
            border-color: #2a2a2a;
            box-shadow: 0 8px 16px rgba(0,0,0,0.35);
        }
        .dark .path-menu li button:hover { background: #2a2a2a; }
        .dark .path-input .drop-btn:hover { background: rgba(255,255,255,0.08); }
        .dark .path-menu li .delete-btn:hover {
            background: #dc2626;
        }

        /* List Picker Dialog */
        .list-picker-dialog {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1250;
        }
        .list-picker-dialog .backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
        }
        .list-picker-dialog .dialog {
            position: relative;
            width: min(520px, 95vw);
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .list-picker-dialog header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
        }
        .list-picker-dialog header .title {
            font-weight: 600;
        }
        .list-picker-dialog .body {
            padding: 14px 16px;
            overflow: auto;
            max-height: 70vh;
        }
        .list-picker-dialog footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding: 12px 16px;
            border-top: 1px solid #eee;
        }

        /* List Picker Dialog - Dark mode */
        body.dark-mode .list-picker-dialog .backdrop {
            background: rgba(0, 0, 0, 0.75);
        }
        body.dark-mode .list-picker-dialog .dialog {
            background: #1e1e1e;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }
        body.dark-mode .list-picker-dialog header {
            border-bottom-color: #333333;
        }
        body.dark-mode .list-picker-dialog header .title {
            color: #e0e0e0;
        }
        body.dark-mode .list-picker-dialog footer {
            border-top-color: #333333;
        }
        /* Directory label style in middle pane */
        .selected-files label.directory {
            text-decoration: underline;
        }

        /* Login Dialog */
        .login-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
        }

        /* Hide app content when not authenticated */
        body.auth-required .mobile-menu-btn {
            display: none;
        }

        body.auth-required .toast-container {
            display: none;
        }

        /* Show loading state before auth check */
        body.auth-checking #app {
            opacity: 0.3;
            pointer-events: none;
        }

        body.auth-checking::before {
            content: 'Loading...';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9998;
            font-size: 18px;
            color: #666;
        }

        .login-dialog {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            width: min(420px, 90vw);
            overflow: hidden;
        }

        .login-dialog header {
            padding: 24px;
            border-bottom: 1px solid #eee;
        }

        .login-dialog header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .login-dialog .body {
            padding: 24px;
        }

        .login-dialog .form-group {
            margin-bottom: 20px;
        }

        .login-dialog .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .login-dialog .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .login-dialog .form-group input:focus {
            outline: 2px solid #3b82f6;
            outline-offset: -1px;
            border-color: #3b82f6;
        }

        .login-dialog .error-message {
            padding: 12px;
            background: #fee;
            border: 1px solid #fcc;
            border-radius: 6px;
            color: #c00;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .login-dialog footer {
            padding: 16px 24px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
        }

        .login-dialog footer button {
            padding: 12px 24px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-dialog footer button:hover:not(:disabled) {
            background: #2563eb;
        }

        .login-dialog footer button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        /* Dark mode for login dialog */
        body.dark-mode .login-dialog {
            background: #1e1e1e;
        }

        body.dark-mode .login-dialog header {
            border-bottom-color: #333;
        }

        body.dark-mode .login-dialog header h2 {
            color: #e0e0e0;
        }

        body.dark-mode .login-dialog .form-group label {
            color: #e0e0e0;
        }

        body.dark-mode .login-dialog .form-group input {
            background: #2a2a2a;
            border-color: #404040;
            color: #e0e0e0;
        }

        body.dark-mode .login-dialog .error-message {
            background: #3a1010;
            border-color: #6a2020;
            color: #ff6b6b;
        }

        body.dark-mode .login-dialog footer {
            border-top-color: #333;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Mobile menu toggle -->
        <mobile-menu-button
            :is-open="mobileMenuOpen"
            @toggle="toggleMobileMenu"
        ></mobile-menu-button>

        <!-- Mobile overlay -->
        <mobile-overlay
            :show="mobileMenuOpen"
            @close="closeMobileMenu"
        ></mobile-overlay>

        <div class="left-pane h-100vh" @click="expandPanes"
            :class="{ 'mobile-open': mobileMenuOpen }"
            :style="{ '--left-width': leftWidth + 'px' }"
        >
            <div class="left-pane__content">
                <div class="flex-first">
                    <path-input
                        v-model="directoryPath"
                        :recent-paths="recentPaths"
                        placeholder="Enter directory path"
                        @delete-recent-path="requestDeleteRecentPath"
                    ></path-input>
                    <button @click="analyzeDirectory" style="margin-left:5px;">Analyze</button>
                </div>

                <div v-if="files.length > 0" class="file-list">
                    <h2 style="font-size: 17px;">Select files to view</h2>
                    <div class="flex">
                        <input-clearable
                            v-model="filterKeyword"
                            placeholder="Filter by keywords, ex: foo -bar"
                            class="flex-1"
                        ></input-clearable>
                        <button @click="clearLeftPane" style="margin-left: 5px;">Clear</button>
                    </div>
                    <div v-for="file in filteredFiles" :key="file.path" class="file-item" :class="{directory: file.type == 'directory'}">
                        <input v-if="file.type === 'directory'"
                               type="checkbox"
                               :id="file.path"
                               :value="file.path"
                               :checked="selectedFiles.includes(file.path)"
                               @change="toggleDirectorySelection(file.path, $event.target.checked)" />
                        <input v-else
                               type="checkbox"
                               :id="file.path"
                               :value="file.path"
                               v-model="selectedFiles" />
                        <label :for="file.path">{{ getRelativePath(file.path) }}</label>
                    </div>
                    <div class="directory-tree">
                        <h3>Directory Structure:</h3>
                        <pre>{{ renderDirectoryTree(filteredFiles) }}</pre>
                    </div>
                </div>
            </div>

            <!-- Resize handle for LEFT pane (outside scroll area) -->
            <resize-handle
                v-model="leftWidth"
                :min="minLeft"
                :get-max="computeMaxLeft"
                :reset-to="DEFAULT_LEFT"
            ></resize-handle>
        </div>

        <div class="middle-pane flex-col h-100vh" :style="{ '--middle-width': middleWidth + 'px' }">
            <!-- Controls header row -->
            <div class="middle-pane__controls">
                <div class="controls-row gap-8">
                    <button @click="viewFiles">View</button>
                    <button @click="viewFilesOutline">Outline</button>
                    <button v-if="!hasCheckedVisibleFiles" @click="checkAllFiles">Check all</button>
                    <button v-if="hasCheckedVisibleFiles" @click="clearCheckedFiles">Un-check</button>
                    <button @click="downloadFiles">Download</button>
                    <div class="flex-1"></div>
                    <button @click="toggleDarkMode"
                            class="dark-mode-toggle"
                            :title="darkMode ? 'Switch to light mode' : 'Switch to dark mode'">
                        <svg v-if="darkMode" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/>
                            <line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                        <svg v-else viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                    <button v-if="collapseLevel < 2" @click="collapseLeftPanes" class="mobile-hidden">←</button>
                    <button v-if="authUsername" @click="handleLogout">Logout</button>
                </div>
                <!-- Search row -->
                <div class="controls-row gap-8">
                    <input-clearable
                        v-model="searchQuery"
                        placeholder="Search for"
                        class="flex-1"
                        @enter="runSearch"
                    ></input-clearable>
                    <button @click="runSearch" style="width: 80px;">Search</button>
                </div>
                <!-- Replace row -->
                <div class="controls-row gap-8">
                    <input-clearable
                        v-model="replaceQuery"
                        placeholder="Replace with"
                        class="flex-1"
                        @enter="runReplace"
                    ></input-clearable>
                    <button @click="runReplace" style="width: 80px;">Replace</button>
                </div>
                <!-- Save to / Load from lists -->
                <div class="controls-row gap-8">
                    <button @click="openSaveListDialog">Save</button>
                    <button @click="openLoadFromListDialog">Load</button>
                    <button @click="clearSelectedFiles">Clear</button>
                    <div class="flex-1"></div>
                    <button @click="openSelectedTree">Tree</button>
                    <button @click="openLinksDialog">Links</button>
                </div>
                <div style="padding: 4px 0 2px 0;">
                    <input-clearable
                        v-model="middlePaneFilter"
                        placeholder="Filter selected files"
                        class="flex-1"
                    ></input-clearable>
                </div>
            </div>

            <div class="selected-files">
                <ul>
                    <li v-for="item in filteredMiddlePaneItems" :key="item.path">
                        <div class="flex">
                            <!-- Checkbox cho directory -->
                            <input v-if="item.type === 'directory'"
                                   type="checkbox"
                                   :id="'middle-dir-' + item.path"
                                   :value="item.path"
                                   :checked="isDirectoryCheckedInMiddle(item.path)"
                                   @change="toggleDirectoryCheckInMiddle(item.path, $event.target.checked)" />

                            <!-- Checkbox cho file -->
                            <input v-else
                                   type="checkbox"
                                   :id="'view-' + item.path"
                                   :value="item.path"
                                   v-model="checkedFiles" />

                            <!-- Label với style khác cho directory -->
                            <label :for="item.type === 'directory' ? 'middle-dir-' + item.path : 'view-' + item.path"
                                   :class="{ 'directory': item.type === 'directory' }">
                                {{ getRelativePath(item.path) }}
                            </label>

                            <!-- Actions chỉ cho files -->
                            <template v-if="item.type === 'file'">
                                <split-button
                                    :primary-label="kindOf(item.path) === 'text' ? 'View' : 'Download'"
                                    :items="getMenuItems(item.path)"
                                    @primary="onPrimary(item.path)"
                                ></split-button>
                                <button @click="removeSelectedFile(item.path)">x</button>
                            </template>

                            <!-- Remove button cho directories -->
                            <button v-else @click="removeSelectedFile(item.path)" style="margin-left: auto;">x</button>
                        </div>

                        <!-- Block list chỉ cho files -->
                        <div v-if="item.type === 'file' && expandedFiles[item.path]" class="block-list">
                            <div v-for="block in expandedFiles[item.path]" :key="block.offset"
                                 class="block-item" :class="['level-' + block.parentOffsets.length]">
                                <input type="checkbox"
                                       :id="'block-' + item.path + '-' + block.offset"
                                       :value="block.offset"
                                       v-model="checkedContentBlocks[item.path]"
                                       @change="onClickContentBlock(item.path, block)" />
                                <label :for="'block-' + item.path + '-' + block.offset">{{ getBlockName(block) }}</label>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
            <!-- Resize handle -->
            <resize-handle
                v-model="middleWidth"
                :min="minMiddle"
                :get-max="computeMaxMiddle"
                :reset-to="DEFAULT_MIDDLE"
            ></resize-handle>
        </div>

        <div v-if="editingFile || searchResult !== null || replaceResult !== null || (mergeContent && mergeContent.length)" class="right-pane h-100vh">
            <div class="file-content-wrapper">
                <button v-if="!editingFile && !searchResult && !replaceResult" @click="downloadMergeContent" class="copy" style="right: 70px;">Download</button>
                <button v-if="!editingFile && !searchResult && !replaceResult" @click="copyMergeContent" class="copy">Copy</button>

                <ace-editor v-if="editingFile" v-model="editingContent" :path="editingFile" @save="saveContent"></ace-editor>

                <search-results
                    v-else-if="searchResult !== null"
                    :data="searchResult"
                    :base-paths="recentPaths"
                    :query="searchQuery"
                    :case-sensitive="true"
                    :use-regex="false"
                    @open="viewSingleFile">
                </search-results>

                <replace-results
                    v-else-if="replaceResult !== null"
                    :data="replaceResult"
                    :query="searchQuery"
                    :replacement="replaceQuery"
                    :to-rel="getRelativePath"
                    @open-file="viewSingleFile">
                </replace-results>

                <div v-else class="file-content" contenteditable="true">{{ mergeContent }}</div>
            </div>
        </div>

        <toast-viewer></toast-viewer>

        <notification-viewer default-title="Notification"></notification-viewer>

        <list-picker-dialog
            v-if="listDialog.open"
            :mode="listDialog.mode"
            :lists="fileLists"
            :allow-create="listDialog.mode === 'save'"
            :confirm-label="listDialog.mode === 'save' ? 'Save' : 'Load'"
            @confirm="handleListConfirm"
            @cancel="closeListDialog"
            @delete-list="handleListDelete"
        ></list-picker-dialog>

        <rename-dialog
            v-if="renameDialog.open"
            :file-path="renameDialog.filePath"
            @confirm="handleRenameConfirm"
            @cancel="renameDialog.open = false"
        ></rename-dialog>

         <delete-confirm-dialog
            v-if="deleteDialog.open"
            title="Delete file"
            :message="deleteDialog.message"
            @confirm="handleDeleteConfirm"
            @cancel="deleteDialog.open = false"
        ></delete-confirm-dialog>

        <delete-confirm-dialog
            v-if="deleteRecentPathDialog.open"
            title="Delete recent path"
            :message="deleteRecentPathDialog.message"
            @confirm="handleDeleteRecentPathConfirm"
            @cancel="deleteRecentPathDialog.open = false"
        ></delete-confirm-dialog>

        <links-dialog
            v-if="linksDialog.open"
            :open="linksDialog.open"
            :mode="linksDialog.mode"
            :links="linksDialog.links"
            :loading="linksDialog.loading"
            @update:mode="(mode) => linksDialog.mode = mode"
            @close="closeLinksDialog"
            @copy="handleLinksCopy"
        ></links-dialog>

        <!-- Login Dialog -->
        <login-dialog
            v-if="showLoginDialog"
            @login-success="handleLoginSuccess"
        ></login-dialog>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.2/ace.min.js"></script>

    <script>
        const { ref, reactive, computed, watch, onMounted, onUnmounted } = Vue;

        window.eventBus = (() => {
              const listeners = new Map();
              return {
                  $on(event, cb) {
                      if (!listeners.has(event)) listeners.set(event, new Set());
                      listeners.get(event).add(cb);
                  },
                  $off(event, cb) {
                      listeners.get(event)?.delete(cb);
                  },
                  $emit(event, payload) {
                      listeners.get(event)?.forEach(fn => {
                          try { fn(payload); } catch (e) { console.error(e); }
                      });
                  }
              };
          })();

        function notify(payload) {
            // payload: string | { title?: string, message?: string, level?: 'info'|'success'|'warn'|'error' }
            window.eventBus.$emit('notification', payload);
        }

        function toast(payload) {
            // payload: string | { title?: string, message?: string, level?: 'info'|'success'|'warn'|'error', timeoutMs?: number }
            window.eventBus.$emit('toast', payload);
        }

        function formatAxiosError(e) {
            const status = e?.response?.status;
            const msg = e?.response?.data?.message || e?.message || 'Unknown error';
            return status ? `[${status}] ${msg}` : msg;
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        // --- helpers for file types ---
        const IMG_EXTS  = ['.png','.jpg','.jpeg','.gif','.webp','.bmp','.svg'];
        const PDF_EXTS  = ['.pdf'];
        const AUDIO_EXTS= ['.mp3','.wav','.ogg','.m4a'];
        const VIDEO_EXTS= ['.mp4','.webm','.ogv'];

        function extOf(path){ const m=path.toLowerCase().match(/\.[^.]+$/); return m?m[0]:''; }
        function isTextFile(path){ return kindOf(path) === 'text'; }
        function kindOf(path){
            const e = extOf(path);
            if (IMG_EXTS.includes(e))   return 'image';
            if (PDF_EXTS.includes(e))   return 'pdf';
            if (AUDIO_EXTS.includes(e)) return 'audio';
            if (VIDEO_EXTS.includes(e)) return 'video';
            return 'text';
        }

        const ToastViewer = {
            template: `
                <div class="toast-container" aria-live="polite" aria-atomic="true">
                    <div v-for="t in toasts" :key="t.id" class="toast" :class="t.level">
                        <div style="display:flex; flex-direction:column; gap:2px;">
                            <div class="title">{{ t.title }}</div>
                            <div class="msg">{{ t.message }}</div>
                        </div>
                        <button class="close" aria-label="Close" @click="dismiss(t.id)">×</button>
                    </div>
                </div>
            `,
            data(){ return { toasts: [] }; },
            methods:{
                handleToast(payload){
                    const id = Date.now() + Math.random();
                    const p = typeof payload === 'string'
                        ? { title:'Notification', message:payload, level:'info' }
                        : { title: payload?.title || 'Notification',
                            message: payload?.message || payload?.text || '',
                            level: payload?.level || 'info',
                            timeoutMs: payload?.timeoutMs };
                    const item = { id, ...p };
                    this.toasts.push(item);
                    const ttl = Number.isFinite(p.timeoutMs) ? p.timeoutMs : 2500;
                    setTimeout(()=>this.dismiss(id), ttl);
                },
                dismiss(id){ this.toasts = this.toasts.filter(t => t.id !== id); }
            },
            mounted(){ window.eventBus.$on('toast', this.handleToast); },
            beforeUnmount(){ window.eventBus.$off('toast', this.handleToast); }
        };

        const NotificationViewer = {
            props: {
                defaultTitle: {
                    type: String,
                    default: 'Notification'
                }
            },
            template: `
                <div v-if="open" class="notification-overlay" @click.self="close" role="dialog" aria-modal="true" :aria-label="title">
                    <div class="backdrop"></div>
                    <div class="dialog">
                        <header class="dialog-header">
                            <div class="dialog-header-title">{{ title }}</div>
                            <button @click="close" aria-label="Close" style="font-size:20px; line-height:1; padding:6px 10px; border-radius:6px; border:1px solid #ddd; cursor:pointer;">×</button>
                        </header>
                        <div class="dialog-body">
                            <pre v-text="content"></pre>
                        </div>
                    </div>
                </div>
            `,
            data() {
                return {
                    open: false,
                    title: this.defaultTitle,
                    content: ''
                };
            },
            methods: {
                handleNotification(payload) {
                    if (typeof payload === 'string') {
                        this.title = this.defaultTitle;
                        this.content = payload;
                    } else {
                        this.title = payload?.title || this.defaultTitle;
                        this.content = payload?.message || payload?.text || '';
                    }
                    this.open = !!this.content;
                },
                close() {
                    this.open = false;
                    this.content = '';
                    this.title = this.defaultTitle;
                },
                onKeyDown(e) {
                    if (this.open && (e.key === 'Escape' || e.key === 'Esc')) this.close();
                }
            },
            mounted() {
                window.eventBus.$on('notification', this.handleNotification);
                window.addEventListener('keydown', this.onKeyDown);
                this.$watch(() => this.open, (open) => {
                    document.body.style.overflow = open ? 'hidden' : '';
                });
            },
            beforeUnmount() {
                window.eventBus.$off('notification', this.handleNotification);
                window.removeEventListener('keydown', this.onKeyDown);
                document.body.style.overflow = '';
            }
        };

        const AceEditor = {
            props: ['modelValue', 'path'],
            emits: ['update:modelValue', 'save'],
            setup(props, { emit }) {
                const editorRef = ref(null);
                let aceEditor = null;

                const getFileExtension = (filename) => {
                    return filename.slice((filename.lastIndexOf(".") - 1 >>> 0) + 2);
                };

                const getModeFromExtension = (extension) => {
                    const modeMap = {
                        js: 'javascript', jsx: 'jsx', ts: 'typescript', tsx: 'tsx',
                        html: 'html', css: 'css', php: 'php', py: 'python', rb: 'ruby',
                        java: 'java', c: 'c_cpp', cpp: 'c_cpp', json: 'json', md: 'markdown',
                        sql: 'sql', xml: 'xml', yaml: 'yaml', sh: 'sh', vue: 'vue'
                    };
                    return modeMap[extension.toLowerCase()] || 'text';
                };

                onMounted(() => {
                    ace.config.set('basePath', 'https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.2/');
                    aceEditor = ace.edit(editorRef.value);

                    aceEditor.setOptions({
                        enableBasicAutocompletion: true,
                        enableLiveAutocompletion: true,
                        enableSnippets: true,
                        showLineNumbers: true,
                        tabSize: 4
                    });

                    aceEditor.setTheme("ace/theme/cloud_editor_dark");

                    const extension = getFileExtension(props.path);
                    const mode = getModeFromExtension(extension);
                    aceEditor.session.setMode(`ace/mode/${mode}`);

                    aceEditor.setValue(props.modelValue, -1);

                    aceEditor.on('change', () => { emit('update:modelValue', aceEditor.getValue()); });

                    const handleKeydown = (event) => {
                        if (event.ctrlKey && event.key === 's') {
                            event.preventDefault();
                            emit('save', aceEditor.getValue());
                        }
                    };

                    document.addEventListener('keydown', handleKeydown);

                    onUnmounted(() => {
                        document.removeEventListener('keydown', handleKeydown);
                        aceEditor.destroy();
                    });
                });

                watch(() => props.modelValue, (newValue) => {
                    if (aceEditor && newValue !== aceEditor.getValue()) {
                        aceEditor.setValue(newValue, -1);
                    }
                });

                return { editorRef };
            },
            template: `<div ref="editorRef" class="editor" style="width: 100%; height: 100%;"></div>`
        };

        const SearchResults = {
            props: ['data', 'basePaths', 'query', 'caseSensitive', 'useRegex'],
            emits: ['open'],
            setup(props, { emit }) {
                const collapsed = Vue.ref(new Set());

                const toggle = (path) => {
                    const s = new Set(collapsed.value);
                    s.has(path) ? s.delete(path) : s.add(path);
                    collapsed.value = s;
                };
                const isCollapsed = (path) => collapsed.value.has(path);

                // Rút gọn path theo recent base paths
                const toRel = (fullPath) => {
                    if (!fullPath) return fullPath;
                    for (const base of props.basePaths || []) {
                        if (fullPath.startsWith(base)) {
                            return fullPath.slice(base.length).replace(/^[\/\\]/, '');
                        }
                    }
                    return fullPath;
                };

                const openFile = (path) => emit('open', path);

                // --- Highlight helpers ---
                function escapeHtml(s) {
                    return s
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                }
                function escapeRegex(s) {
                    return s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                }
                function highlightPreview(preview) {
                    if (!props.query) return escapeHtml(preview);

                    // Regex mode: dùng RegExp
                    if (props.useRegex) {
                        const flags = props.caseSensitive ? 'g' : 'gi';
                        let re;
                        try {
                            re = new RegExp(props.query, flags);
                        } catch (e) {
                            // Regex invalid -> fallback literal
                            return highlightLiteral(preview, props.query, props.caseSensitive);
                        }
                        return escapeHtml(preview).replace(
                            new RegExp(props.query, flags),
                            (m) => `<span class="sr-hit">${escapeHtml(m)}</span>`
                        );
                    }

                    // Literal mode
                    return highlightLiteral(preview, props.query, props.caseSensitive);
                }
                function highlightLiteral(preview, needle, caseSensitive) {
                    if (!needle) return escapeHtml(preview);
                    const src = caseSensitive ? preview : preview.toLowerCase();
                    const pat = caseSensitive ? needle : needle.toLowerCase();

                    let out = '';
                    let i = 0;
                    const n = pat.length;
                    if (n === 0) return escapeHtml(preview);

                    while (true) {
                        const p = src.indexOf(pat, i);
                        if (p === -1) {
                            out += escapeHtml(preview.slice(i));
                            break;
                        }
                        out += escapeHtml(preview.slice(i, p));
                        out += `<span class="sr-hit">${escapeHtml(preview.slice(p, p + n))}</span>`;
                        i = p + n;
                    }
                    return out;
                }

                return { toggle, isCollapsed, openFile, toRel, highlightPreview };
            },
            template: `
                <div class="sr-root" style="height:100%; overflow:auto; padding:10px; font-family: 'Roboto Mono', monospace;">
                    <div style="border-bottom: 1px solid gray; padding-bottom: 5px;">Scanned: {{data.summary.scanned}} · Files matched: {{data.summary.matched_files}} · Total occurrences: {{data.summary.total_matches}}</div>

                    <div v-for="file in data.matches" :key="file.path" style="margin-top:12px;">
                        <div style="font-weight:bold">
                            <span style="cursor:pointer; margin-right:6px;" @click="toggle(file.path)">
                                {{ isCollapsed(file.path) ? '[+]' : '[-]' }}
                            </span>
                            <span>File: </span>
                            <a href="javascript:void(0)" @click="openFile(file.path)">{{ toRel(file.path) }}</a>
                        </div>

                        <div v-show="!isCollapsed(file.path)" style="border-left: 1px solid #4c4d4d; margin-left: 13px;">
                            <div v-for="line in file.lines" :key="file.path + ':' + line.line" style="padding-left:8px; margin-bottom:8px;">
                                <div style="display: flex;">
                                    <div>- Line {{line.line}} - </div>
                                    <div style="margin-left: 10px; white-space:pre; overflow:hidden;"
                                         v-html="highlightPreview(line.preview)"></div>
                                </div>
                            </div>
                            <div style="padding-left:8px;">Found {{ file.total }} occurrence<span v-if="file.total > 1">s</span>.</div>
                        </div>
                    </div>
                </div>
            `
        };

        const ReplaceResults = {
            props: {
                data: { type: Object, required: true },
                query: { type: String, required: true },
                replacement: { type: String, required: true },
                toRel: { type: Function, required: true }
            },
            emits: ['open-file'],
            setup(props, { emit }) {
                const collapsed = Vue.reactive(new Set());

                function toggle(path) {
                    if (collapsed.has(path)) collapsed.delete(path); else collapsed.add(path);
                }
                function isCollapsed(path) { return collapsed.has(path); }
                function openFile(path) { emit('open-file', path); }

                // highlight match (literal, case-sensitive; giữ nguyên style Search)
                function highlightPreview(text) {
                    if (!props.query) return escapeHtml(text);
                    const pattern = escapeRegExp(props.query);
                    const re = new RegExp(pattern, 'g');
                    return escapeHtml(text).replace(
                        new RegExp(pattern, 'g'),
                        (m) => `<span style="color:#c00; font-weight:bold;">${escapeHtml(m)}</span>`
                    );
                }

                // render preview sau khi replace (literal, case-sensitive)
                function replacePreview(text) {
                    if (!props.query) return escapeHtml(text);
                    const pattern = escapeRegExp(props.query);
                    return escapeHtml(text).replace(
                        new RegExp(pattern, 'g'),
                        () => `<span>${escapeHtml(props.replacement)}</span>`
                    );
                }

                function escapeHtml(s) {
                    return String(s)
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                }
                function escapeRegExp(s) {
                    return s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                }

                return { toggle, isCollapsed, openFile, highlightPreview, replacePreview };
            },
            template: `
                <div class="sr-root" style="height:100%; overflow:auto; padding:10px; font-family: 'Roboto Mono', monospace;">
                    <div style="border-bottom: 1px solid gray; padding-bottom: 5px;">
                        Scanned: {{data.summary.scanned}} · Files matched: {{data.summary.matched_files}} · Total occurrences: {{data.summary.total_matches}}
                    </div>

                    <div v-for="file in data.matches" :key="file.path" style="margin-top:12px;">
                        <div style="font-weight:bold">
                            <span style="cursor:pointer; margin-right:6px;" @click="toggle(file.path)">
                                {{ isCollapsed(file.path) ? '[+]' : '[-]' }}
                            </span>
                            <span>File: </span>
                            <a href="javascript:void(0)" @click="openFile(file.path)">{{ toRel(file.path) }}</a>
                        </div>

                        <div v-show="!isCollapsed(file.path)" style="border-left: 1px solid #4c4d4d; margin-left: 13px;">
                            <div v-for="line in file.lines" :key="file.path + ':' + line.line" style="padding-left:8px; margin-bottom:8px;">
                                <div style="display:flex;">
                                    <div>- Line {{line.line}} -</div>
                                    <div style="margin-left:10px; white-space:pre; overflow:auto;" v-html="highlightPreview(line.preview)"></div>
                                </div>
                                <div style="display:flex;">
                                    <div>- Replaced by -</div>
                                    <div style="margin-left:10px; white-space:pre; overflow:auto;" v-html="replacePreview(line.preview)"></div>
                                </div>
                            </div>
                            <div style="padding-left:8px;">Found {{ file.total }} occurrence<span v-if="file.total > 1">s</span>.</div>
                        </div>
                    </div>
                </div>
            `
        };

        const RenameDialog = {
            name: 'RenameDialog',
            props: {
                filePath: { type: String, required: true }
            },
            emits: ['confirm', 'cancel'],
            setup(props, { emit }) {
                const currentName = ref('');
                const newName = ref('');
                const inputRef = ref(null);

                onMounted(() => {
                    const name = props.filePath.split('/').pop();
                    currentName.value = name;
                    newName.value = name;
                    Vue.nextTick(() => {
                        if (inputRef.value) {
                            inputRef.value.focus();
                            inputRef.value.select();
                        }
                    });
                    document.addEventListener('keydown', onKeyDown);
                });

                onUnmounted(() => {
                    document.removeEventListener('keydown', onKeyDown);
                });

                const canConfirm = computed(() => {
                    const val = (newName.value || '').trim();
                    return val && val !== currentName.value;
                });

                function onKeyDown(e) {
                    if (e.key === 'Escape') emit('cancel');
                    if (e.key === 'Enter' && canConfirm.value) doConfirm();
                }

                function doConfirm() {
                    if (!canConfirm.value) return;
                    emit('confirm', newName.value.trim());
                }

                function doCancel() {
                    emit('cancel');
                }

                return { newName, inputRef, canConfirm, doConfirm, doCancel };
            },
            template: `
                <div class="confirm-dialog-overlay" role="dialog" aria-modal="true">
                    <div class="backdrop" @click="doCancel"></div>
                    <div class="confirm-dialog">
                        <header>
                            <h3>Rename file</h3>
                            <button @click="doCancel" aria-label="Close">×</button>
                        </header>
                        <div class="body">
                            <p>Enter new file name:</p>
                            <input ref="inputRef" v-model="newName" type="text" @keydown.enter="doConfirm" @keydown.esc="doCancel" />
                        </div>
                        <footer>
                            <button class="cancel" @click="doCancel">Cancel</button>
                            <button class="primary" :disabled="!canConfirm" @click="doConfirm">Rename</button>
                        </footer>
                    </div>
                </div>
            `
        };

        const DeleteConfirmDialog = {
            name: 'DeleteConfirmDialog',
            props: {
                title: { type: String, default: 'Delete confirmation' },
                message: { type: String, required: true }
            },
            emits: ['confirm', 'cancel'],
            template: `
                <div class="confirm-dialog-overlay" role="dialog" aria-modal="true">
                    <div class="backdrop" @click="$emit('cancel')"></div>
                    <div class="confirm-dialog">
                        <header>
                            <h3>{{ title }}</h3>
                            <button @click="$emit('cancel')" aria-label="Close">×</button>
                        </header>
                        <div class="body">
                            <p>{{ message }}</p>
                        </div>
                        <footer>
                            <button class="cancel" @click="$emit('cancel')">Cancel</button>
                            <button class="danger" @click="$emit('confirm')">Delete</button>
                        </footer>
                    </div>
                </div>
            `
        };

        const InputClearable = {
            name: 'InputClearable',
            props: {
                modelValue: { type: String, default: '' },
                placeholder: { type: String, default: '' }
            },
            emits: ['update:modelValue', 'clear', 'enter'],
            setup(props, { emit }) {
                function onInput(e) { emit('update:modelValue', e.target.value); }
                function clearInput() {
                    emit('update:modelValue', '');
                    emit('clear');
                }
                function onKeydown(e) {
                    if (e.key === 'Enter') { emit('enter'); }
                }
                return { onInput, clearInput, onKeydown };
            },
            template: `
                <div style="position:relative; display:flex; align-items:center;">
                    <input
                        :value="modelValue"
                        :placeholder="placeholder"
                        @input="onInput"
                        @keydown="onKeydown"
                        style="flex:1; padding-right:26px;"
                    >
                    <button
                        v-if="modelValue && modelValue.length"
                        @click="clearInput"
                        type="button"
                        aria-label="Clear input"
                        title="Clear"
                        style="position:absolute; right:6px; border:none; background:transparent; cursor:pointer; font-weight:bold;"
                    >×</button>
                </div>
            `
        };

        const SplitButton = {
            name: 'SplitButton',
            props: {
                primaryLabel: { type: String, required: true },
                items: { type: Array, default: () => [] }, // [{ label, action, disabled }]
                align: { type: String, default: 'right' }, // 'left' | 'right'
                sizeClass: { type: String, default: 'small-button' }
            },
            emits: ['primary'],
            setup(props, { emit }) {
                const open = ref(false);
                const root = ref(null);
                const menuRef = ref(null);
                const dropUp = ref(false);
                const maxH = ref(320); // sẽ cập nhật theo không gian thực tế

                function closeOnDoc(e){
                    if (!root.value) return;
                    if (!root.value.contains(e.target)) open.value = false;
                }

                function onPrimary(){ emit('primary'); }
                function onToggle(){
                    open.value = !open.value;
                    if (open.value) Vue.nextTick(reposition);
                }
                function onSelect(it){
                    if (!it || it.disabled) return;
                    try { it.action?.(); } finally { open.value = false; }
                }
                function onKeydown(e){
                    if (e.key === 'Enter'){ e.preventDefault(); onPrimary(); }
                    else if (e.key === 'ArrowDown'){ e.preventDefault(); open.value = true; Vue.nextTick(reposition); }
                    else if (e.key === 'Escape'){ open.value = false; }
                }

                function reposition(){
                    if (!root.value || !menuRef.value) return;
                    const rect = root.value.getBoundingClientRect();
                    const menuEl = menuRef.value;

                    // đo kích thước thực của menu
                    const mh = menuEl.scrollHeight || menuEl.offsetHeight || 0;

                    const vpH = window.innerHeight || document.documentElement.clientHeight || 0;
                    const spaceBelow = Math.max(0, vpH - rect.bottom - 8); // chừa 8px
