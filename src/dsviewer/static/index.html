                    const spaceAbove = Math.max(0, rect.top - 8);

                    // chọn hướng
                    dropUp.value = (spaceBelow < mh) && (spaceAbove > spaceBelow);

                    // giới hạn chiều cao theo hướng đã chọn
                    maxH.value = dropUp.value ? Math.min(320, spaceAbove) : Math.min(320, spaceBelow);
                }

                function onWinChange(){
                    if (open.value) reposition();
                }

                onMounted(()=>{
                    document.addEventListener('click', closeOnDoc, true);
                    window.addEventListener('resize', onWinChange, true);
                    // capture scroll từ mọi container → chỉ reposition/đóng nếu cần
                    document.addEventListener('scroll', onWinChange, true);
                });
                onUnmounted(()=>{
                    document.removeEventListener('click', closeOnDoc, true);
                    window.removeEventListener('resize', onWinChange, true);
                    document.removeEventListener('scroll', onWinChange, true);
                });

                return { open, root, menuRef, dropUp, maxH, onPrimary, onToggle, onSelect, onKeydown };
            },
            template: `
                <div ref="root" class="split-button" @keydown="onKeydown">
                    <button type="button" :class="sizeClass" @click="onPrimary">{{ primaryLabel }}</button>
                    <button type="button" :class="sizeClass" aria-haspopup="menu"
                            :aria-expanded="open ? 'true' : 'false'" @click="onToggle">▾</button>

                    <ul v-if="open"
                        ref="menuRef"
                        class="menu"
                        :class="dropUp ? 'drop-up' : 'drop-down'"
                        role="menu"
                        :style="{ [align==='right' ? 'right' : 'left']: '0', maxHeight: maxH + 'px', overflowY: 'auto' }">
                        <li v-for="(it,i) in items" :key="i" role="menuitem">
                            <button type="button" :disabled="it?.disabled" @click="onSelect(it)">{{ it.label }}</button>
                        </li>
                    </ul>
                </div>
            `
        };

        const MobileMenuButton = {
            name: 'MobileMenuButton',
            props: {
                isOpen: { type: Boolean, default: false }
            },
            emits: ['toggle'],
            setup(props, { emit }) {
                const handleToggle = () => {
                    emit('toggle');
                };

                return { handleToggle };
            },
            template: `
                <button
                    class="mobile-menu-btn"
                    :class="{ active: isOpen }"
                    @click="handleToggle"
                    aria-label="Toggle menu"
                    :aria-expanded="isOpen ? 'true' : 'false'"
                >
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            `
        };

        const MobileOverlay = {
            name: 'MobileOverlay',
            props: {
                show: { type: Boolean, default: false }
            },
            emits: ['close'],
            setup(props, { emit }) {
                const handleClose = () => {
                    emit('close');
                };

                return { handleClose };
            },
            template: `
                <div
                    v-if="show"
                    @click="handleClose"
                    class="mobile-overlay"
                    style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000;"
                ></div>
            `
        };

        const ResizeHandle = {
            name: 'ResizeHandle',
            props: {
                modelValue: { type: Number, required: true },
                min: { type: Number, default: 280 },
                getMax: { type: Function, required: true },
                resetTo: { type: Number, default: 460 }
            },
            emits: ['update:modelValue'],
            setup(props, { emit }) {
                let startX = 0, startVal = 0, rafId = 0;
                function maxNow() { try { return Number(props.getMax?.()) || Infinity; } catch { return Infinity; } }
                function clamp(v) { return Math.min(Math.max(v, Number(props.min) || 0), maxNow()); }
                function onStart(e){
                    startX = e.clientX; startVal = props.modelValue;
                    e.currentTarget.setPointerCapture?.(e.pointerId);
                    document.body.style.userSelect = 'none';
                    window.addEventListener('pointermove', onMove, true);
                    window.addEventListener('pointerup', onEnd, true);
                }
                function onMove(e){
                    if (rafId) cancelAnimationFrame(rafId);
                    rafId = requestAnimationFrame(() => {
                        const delta = e.clientX - startX;
                        emit('update:modelValue', clamp(startVal + delta));
                    });
                }
                function onEnd(){
                    document.body.style.userSelect = '';
                    window.removeEventListener('pointermove', onMove, true);
                    window.removeEventListener('pointerup', onEnd, true);
                }
                function onDbl(){ emit('update:modelValue', clamp(Number(props.resetTo))); }
                function onKey(e){
                    const step = e.shiftKey ? 50 : 10;
                    let v = props.modelValue;
                    if (e.key === 'ArrowLeft') { v -= step; }
                    else if (e.key === 'ArrowRight') { v += step; }
                    else if (e.key === 'Home') { v = Number(props.min) || 0; }
                    else if (e.key === 'End') { v = maxNow(); }
                    else { return; }
                    e.preventDefault();
                    emit('update:modelValue', clamp(v));
                }
                return { onStart, onDbl, onKey };
            },
            template: `
                <div class="resize-handle"
                     role="separator"
                     aria-orientation="vertical"
                     :aria-valuemin="min"
                     :aria-valuenow="modelValue"
                     tabindex="0"
                     @pointerdown="onStart"

                const inputEl = Vue.ref(null);

                // Menu positioning state
                const dropUp = Vue.ref(false);
                const maxHeight = Vue.ref(320);
                const coords = Vue.reactive({ left: 0, top: 0, width: 0 });

                // Constants
                const MAX_MENU_HEIGHT = 320;
                const MIN_SPACE_THRESHOLD = 200;

                const handleInput = (e) => {
                    emit('update:modelValue', e.target.value);
                };

                const computeMenuPosition = () => {
                    const rect = inputEl.value?.getBoundingClientRect();
                    if (!rect) return;

                    coords.left = rect.left;
                    coords.width = rect.width;

                    const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
                    const spaceBelow = Math.max(0, viewportHeight - rect.bottom - MENU_SPACING);
                    const spaceAbove = Math.max(0, rect.top - MENU_SPACING);

                    const shouldDropUp = spaceBelow < MIN_SPACE_THRESHOLD && spaceAbove > spaceBelow;
                    dropUp.value = shouldDropUp;

                    const availableSpace = shouldDropUp ? spaceAbove : spaceBelow;
                    maxHeight.value = Math.min(MAX_MENU_HEIGHT, availableSpace);

                    coords.top = shouldDropUp ? rect.top : rect.bottom;
                };

                const toggleMenu = (nextState = !open.value) => {
                    open.value = nextState;
                    if (open.value) {
                        Vue.nextTick(computeMenuPosition);
                    }

                const selectPath = (path) => {
                    emit('update:modelValue', path);
                    open.value = false;
                    inputEl.value?.focus?.();

                const requestDeletePath = (path, event) => {
                    event.stopPropagation();
                    emit('deleteRecentPath', path);

                const handleClickOutside = (e) => {
                    const target = e.target;
                    const isInsideRoot = root.value?.contains(target);
                    const isInsideMenu = menuRef.value?.contains?.(target);

                    if (!isInsideRoot && !isInsideMenu) {
                        open.value = false;
                    }
                };

                const handleKeydown = (e) => {
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        toggleMenu(true);
                    } else if (e.key === 'Escape') {
                        toggleMenu(false);
                    }
                };

                const handleWindowChange = () => {
                    if (open.value) {
                        computeMenuPosition();
                    }
                };

                // Computed
                const menuStyle = Vue.computed(() => ({
                    position: 'fixed',
                    left: `${coords.left}px`,
                    top: `${coords.top}px`,
                    minWidth: `${coords.width}px`,
                    maxHeight: `${maxHeight.value}px`,
                    transform: dropUp.value ? 'translateY(-100%)' : 'none',
                    overflowY: 'auto',
                    zIndex: 2000
                }));

                const hasRecentPaths = Vue.computed(() => {
                    return props.recentPaths && props.recentPaths.length > 0;
                });

                // Lifecycle
                Vue.onMounted(() => {
                    document.addEventListener('click', handleClickOutside, true);
                    document.addEventListener('scroll', handleWindowChange, true);
                    window.addEventListener('resize', handleWindowChange, true);
                });

                Vue.onUnmounted(() => {
                    document.removeEventListener('click', handleClickOutside, true);
                    document.removeEventListener('scroll', handleWindowChange, true);
                    window.removeEventListener('resize', handleWindowChange, true);
                });

                return {
                    // Refs
                    root,
                    inputEl,
                    menuRef,
                    open,
                    // Methods
                    handleInput,
                    toggleMenu,
                    selectPath,
                    handleKeydown,
                    requestDeletePath,
                    // Computed
                    menuStyle,
                    hasRecentPaths
                };
            },

            template: `

                        config => {
                            if (authToken.value) {
                                config.headers.Authorization = `Bearer ${authToken.value}`;
                            }
                            return config;
                        },
                        error => Promise.reject(error)
                    );

                    // Response interceptor - handle 401
                    axios.interceptors.response.use(
                        response => response,
                        error => {
                            if (error.response?.status === 401) {
                                handleLogout();
                                toast({
                                    title: 'Session Expired',
                                    message: 'Please login again',
                                    level: 'warn'
                                });
                            }
                            return Promise.reject(error);
                        }
                    );
                }

                // === AUTH FUNCTIONS ===
                function checkAuth() {
                    const token = localStorage.getItem('auth_token');
                    const username = localStorage.getItem('auth_username');
                    const expires = parseInt(localStorage.getItem('auth_expires') || '0');

                    if (token && username && expires > Date.now() / 1000) {
                        authToken.value = token;
                        authUsername.value = username;
                        showLoginDialog.value = false;
                        document.body.classList.remove('auth-required');
                        document.body.classList.remove('auth-checking');
                        return true;
                    } else {
                        // Token expired or invalid
                        clearAuth();
                        showLoginDialog.value = true;
                        document.body.classList.add('auth-required');
                        document.body.classList.remove('auth-checking');
                        return false;
                    }
                }

                function clearAuth() {
                    authToken.value = '';
                    authUsername.value = '';
                    localStorage.removeItem('auth_token');
                    localStorage.removeItem('auth_username');
                    localStorage.removeItem('auth_expires');
                    document.body.classList.add('auth-required');
                    document.body.classList.remove('auth-checking');
                }

                function handleLoginSuccess({ token, username }) {
                    authToken.value = token;
                    authUsername.value = username;
                    showLoginDialog.value = false;
                    document.body.classList.remove('auth-required');
                }

                async function handleLogout() {
                    try {
                        await axios.post('/api', { action: 'logout' });
                    } catch (e) {
                        console.error('Logout error:', e);
                    } finally {
                        clearAuth();
                        showLoginDialog.value = true;
                        document.body.classList.add('auth-required');
                    }
                }

                const filteredFiles = computed(() => {
                    let list = files.value;
                    const raw = (filterKeyword.value || '').trim();

                    if (!raw) return list;

                    const tokens = raw.split(/[\s,]+/).filter(Boolean);

                    const includes = [];
                    const excludes = [];

                    for (const tok of tokens) {
                        if (tok.startsWith('-') && tok.length > 1) {
                            excludes.push(tok.slice(1).toLowerCase());
                        } else {
                            includes.push(tok.toLowerCase());
                        }
                    }

                    // Helper: tạo matcher từ keyword có thể chứa '*'
                    const toMatcher = (kw) => {
                        if (kw.includes('*')) {
                            const esc = kw.replace(/[-\/\\^$+?.()|[\]{}]/g, '\\$&');
                            const pattern = new RegExp(esc.replace(/\*/g, '.*'), 'i');
                            return (path) => pattern.test(path);
                        } else {
                            return (path) => path.includes(kw);
                        }
                    };

                    const includeMatchers = includes.map(toMatcher);
                    const excludeMatchers = excludes.map(toMatcher);

                    if (includeMatchers.length) {
                        list = list.filter(file => {
                            const path = file.path.toLowerCase();
                            // OR: chỉ cần khớp 1 include
                            return includeMatchers.some(fn => fn(path));
                        });
                    }

                    if (excludeMatchers.length) {
                        list = list.filter(file => {
                            const path = file.path.toLowerCase();
                            // Loại nếu khớp bất kỳ exclude
                            return !excludeMatchers.some(fn => fn(path));
                        });
                    }

                    return list;
                });

                const filteredMiddlePaneItems = computed(() => {
                    // Step 1: Map selected paths to typed objects
                    const items = selectedFilesForMiddle.value || [];
                    const itemsWithType = items.map(path => {
                        const file = files.value.find(f => f.path === path);
                        if (file) return file;

                        const prefix = path.endsWith('/') ? path : path + '/';
                        const hasChildren = files.value.some(f => f.path.startsWith(prefix));
                        return { path, type: hasChildren ? 'directory' : 'file' };
                    });

                    // Step 2: Apply filter if exists
                    let result = itemsWithType;
                    const filterText = (middlePaneFilter.value || '').trim();

                    if (filterText) {
                        const tokens = filterText.split(/[\s,]+/).filter(Boolean);
                        const includes = tokens.filter(t => !t.startsWith('-') || t.length === 1);
                        const excludes = tokens.filter(t => t.startsWith('-') && t.length > 1).map(t => t.slice(1));

                        const toMatcher = (kw) => {
                            const lower = kw.toLowerCase();
                            if (lower.includes('*')) {
                                const pattern = new RegExp(lower.replace(/[-\/\\^$+?.()|[\]{}]/g, '\\$&').replace(/\*/g, '.*'), 'i');
                                return (path) => pattern.test(path);
                            }
                            return (path) => path.includes(lower);
                        };

                        const includeMatchers = includes.map(toMatcher);
                        const excludeMatchers = excludes.map(toMatcher);

                        result = result.filter(item => {
                            const rel = getRelativePath(item.path).toLowerCase();
                            const included = !includeMatchers.length || includeMatchers.some(fn => fn(rel));
                            const excluded = excludeMatchers.some(fn => fn(rel));
                            return included && !excluded;
                        });
                    }

                    // Step 3: Derive parent directories
                    const basePath = recentPaths.value[0] || '';
                    const resultPaths = result.map(item => item.path);
                    const directoriesSet = new Set();

                    for (const path of resultPaths) {
                        let current = path;
                        while (true) {
                            const lastSlash = current.lastIndexOf('/');
                            if (lastSlash === -1) break;

                            const parent = current.substring(0, lastSlash);
                            if (basePath && (!parent.startsWith(basePath) || parent.length <= basePath.length)) break;

                            const prefix = parent + '/';
                            if (resultPaths.some(p => p.startsWith(prefix))) {
                                directoriesSet.add(parent);
                                current = parent;
                            } else break;
                        }
                    }

                    // Step 4: Add directories with >= 2 direct children
                    const isDirectChild = (parentPath, childPath) => {
                        const prefix = parentPath + '/';
                        if (!childPath.startsWith(prefix)) return false;
                        const remainder = childPath.substring(prefix.length);
                        return !remainder.includes('/');
                    };

                    directoriesSet.forEach(dirPath => {
                        const children = [
                            ...resultPaths.filter(p => isDirectChild(dirPath, p)),
                            ...Array.from(directoriesSet).filter(d => d !== dirPath && isDirectChild(dirPath, d))
                        ];

                        if (children.length >= 2 && !result.find(item => item.path === dirPath)) {
                            const file = files.value.find(f => f.path === dirPath);
                            result.push(file || { path: dirPath, type: 'directory' });
                        }
                    });

                    // Step 5: Sort hierarchically
                    result.sort((a, b) => {
                        const aParts = a.path.split(/[\/\\]/).filter(Boolean);
                        const bParts = b.path.split(/[\/\\]/).filter(Boolean);
                        const minLen = Math.min(aParts.length, bParts.length);

                        for (let i = 0; i < minLen; i++) {
                            if (aParts[i] !== bParts[i]) return aParts[i].localeCompare(bParts[i]);
                        }

                        if (aParts.length !== bParts.length) return aParts.length - bParts.length;
                        if (a.type !== b.type) return a.type === 'directory' ? -1 : 1;
                        return 0;
                    });

                    return result;
                });

                const hasCheckedVisibleFiles = computed(() => {
                    const visibleFiles = new Set(
                        filteredMiddlePaneItems.value
                            .filter(item => item.type === 'file')
                            .map(item => item.path)
                    );
                    return checkedFiles.value.some(p => visibleFiles.has(p));
                });

                const selectedFilesSnapshot = ref([]);
                const selectedFilesForMiddle = computed(() => {
                    const merged = new Set([...(selectedFilesSnapshot.value || []), ...(selectedFiles.value || [])]);
                    return Array.from(merged);
                });

                const selectedFilesNonDir = computed(() => {
                    return selectedFilesForMiddle.value
                        .map(p => files.value.find(f => f.path === p))
                        .filter(Boolean)
                        .filter(f => f.type === 'file')
                        .map(f => f.path);
                });

                const checkedFilesNonDir = computed(() => {
                    const set = new Set(checkedFiles.value);
                    return files.value
                        .filter(f => f.type === 'file' && set.has(f.path))
                        .map(f => f.path);
                });

                const checkedFilesNonDirText = computed(() => {
                    const set = new Set(checkedFiles.value);
                    return files.value
                        .filter(f => f.type === 'file' && set.has(f.path) && isTextFile(f.path))
                        .map(f => f.path);
                });

                const renderDirectoryTree = (items) => {
                    // Build trie but root at directoryPath (relative root)
                    const base = String(directoryPath.value || '').replace(/[\/\\]+$/, '');
                    const baseWithSep = base ? base + '/' : '';

                    const paths = (items || [])
                        .map(x => typeof x === 'string' ? x : (x?.type === 'file' || !x?.type) ? x?.path : null)
                        .filter(Boolean)
                        .map(p => {
                            // relativize to directoryPath if under it; else keep as-is
                            if (base && (p === base || p.startsWith(baseWithSep))) {
                                return p.slice(base.length).replace(/^[\/\\]/, '');
                            }
                            return p;
                        });

                    const root = new Map(); // Map<segment, Map>
                    for (const p of paths) {
                        const parts = String(p).split(/[\/\\]+/).filter(Boolean);
                        let node = root;
                        for (const seg of parts) {
                            if (!node.has(seg)) node.set(seg, new Map());
                            node = node.get(seg);
                        }
                    }

                    const render = (node, indent = '') => {
                        let out = '';
                        const entries = Array.from(node.entries()).sort((a, b) => a[0].localeCompare(b[0]));
                        for (const [name, child] of entries) {
                            out += `${indent}├── ${name}\n`;
                            if (child && child.size) out += render(child, `${indent}│   `);
                        }
                        return out;
                    };
                    return render(root);
                };

                const mergeContent = computed(() => {
                    if (!Array.isArray(fileContents.value)) return '';
                    let content = '';
                    for (let i = 0; i < fileContents.value.length; i++) {
                        const item = fileContents.value[i];
                        content += "============================================\n";
                        content += 'File: ' + getRelativePath(item.path) + "\n";
                        content += "============================================\n";
                        content += "```\n";
                        content += item.content + "\n";
                        content += "```\n\n";
                    }
                    return content;
                });

                watch(state, debounce(() => { saveStateToLocalStorage(); }, 1000));

                watch(fileContents, () => {
                    editingFile.value = '';
                    editingContent.value = '';
                });

                watch(collapseLevel, (newValue) => {
                    if (newValue === 1) {
                        document.body.classList.toggle('collapse-1');
                    } else if (newValue === 2) {
                        document.body.classList.toggle('collapse-2');
                    } else if (newValue === 0) {
                        document.body.classList.remove('collapse-1');
                        document.body.classList.remove('collapse-2');
                    }
                });

                watch(darkMode, (newValue) => {
                    if (newValue) {
                        document.body.classList.add('dark-mode');
                    } else {
                        document.body.classList.remove('dark-mode');
                    }
                });

                onMounted(() => {
                    document.body.classList.add('auth-checking');
                    setupAxiosInterceptor();
                    checkAuth();
                    document.body.classList.remove('auth-checking');
                    loadStateFromLocalStorage();
                    // clamp with current viewport
                    leftWidth.value = Math.min(Math.max(leftWidth.value, minLeft), computeMaxLeft());
                    middleWidth.value = Math.min(Math.max(middleWidth.value, minMiddle), computeMaxMiddle());
                    window.addEventListener('resize', onWindowResize, true);
                    loadListsFromStorage();

                    if (darkMode.value) {
                        document.body.classList.add('dark-mode');
                    }
                });

                onUnmounted(() => {
                    window.removeEventListener('resize', onWindowResize, true);
                });

                function saveStateToLocalStorage() {
                    localStorage.setItem('directory-structure-viewer', JSON.stringify(state.value));
                }
                function loadStateFromLocalStorage() {
                    const saved = JSON.parse(localStorage.getItem('directory-structure-viewer')) || {};
                    directoryPath.value = saved.directoryPath || '';
                    recentPaths.value = saved.recentPaths || [];
                    filterKeyword.value = saved.filterKeyword || '';
                    files.value = saved.files || [];
                    selectedFiles.value = saved.selectedFiles || [];
                    selectedFilesSnapshot.value = saved.selectedFilesSnapshot || [];
                    checkedFiles.value = saved.checkedFiles || [];
                    fileContents.value = saved.fileContents || [];
                    editingFile.value = saved.editingFile || '';
                    editingContent.value = saved.editingContent || '';
                    collapseLevel.value = saved.collapseLevel || 0;
                    searchQuery.value = saved.searchQuery || '';
                    replaceQuery.value = saved.replaceQuery || '';
                    searchResult.value = saved.searchResult ?? null;
                    replaceResult.value = saved.replaceResult ?? null;
                    leftWidth.value = Math.min(
                        Math.max(Number(saved.leftWidth) || DEFAULT_LEFT, minLeft),
                        computeMaxLeft()
                    );
                    darkMode.value = saved.darkMode || false;
                    middleWidth.value = Math.min(
                        Math.max(Number(saved.middleWidth) || DEFAULT_MIDDLE, minMiddle),
                        computeMaxMiddle()
                    );
                }

                function addRecentPath(path) {
                    const updated = [path, ...recentPaths.value.filter(p => p !== path)];
                    recentPaths.value = updated.slice(0, 5);
                }

                async function analyzeDirectory() {
                    if (!directoryPath.value) {
                        notify({ title: 'Analyze directory', message: 'Please enter a directory path.', level: 'warn' });
                        return;
                    }
                    try {
                        const response = await axios.post('/api', { action: 'list_files', path: directoryPath.value });
                        files.value = response.data.files || [];
                        addRecentPath(directoryPath.value);
                    } catch (e) { console.error('Error fetching files:', e); }
                }

                function isExpandableFile(file) {
                    const exts = ['.php','.js','.vue','.html','.tpl','.md'];
                    const lower = file.toLowerCase();
                    return exts.some(ext => lower.endsWith(ext));
                }

                function toggleDirectorySelection(dirPath, checked) {
                    const prefix = dirPath.endsWith('/') ? dirPath : dirPath + '/';  
                    if (checked) {
                        const toAdd = new Set(selectedFiles.value);
                        toAdd.add(dirPath);
                        for (const item of filteredFiles.value) {
                            if (item.path.startsWith(prefix)) toAdd.add(item.path);
                        }
                        selectedFiles.value = Array.from(toAdd);
                    } else {
                        selectedFiles.value = selectedFiles.value.filter(p => p !== dirPath && !p.startsWith(prefix));
                    }
                }

                function isDirectoryCheckedInMiddle(dirPath) {
                    const prefix = dirPath.endsWith('/') ? dirPath : dirPath + '/';

                    // Chỉ xét files VISIBLE trong filteredMiddlePaneItems
                    const visibleFilesInDir = filteredMiddlePaneItems.value
                        .filter(item => item.type === 'file' && item.path.startsWith(prefix))
                        .map(item => item.path);

                    // Nếu không có file nào visible, coi như unchecked
                    if (visibleFilesInDir.length === 0) return false;

                    const checkedSet = new Set(checkedFiles.value);
                    return visibleFilesInDir.every(p => checkedSet.has(p));
                }

                function toggleDirectoryCheckInMiddle(dirPath, checked) {
                    const prefix = dirPath.endsWith('/') ? dirPath : dirPath + '/';

                    // Chỉ xét files VISIBLE trong filteredMiddlePaneItems
                    const visibleFilesInDir = filteredMiddlePaneItems.value
                        .filter(item => item.type === 'file' && item.path.startsWith(prefix))
                        .map(item => item.path);

                    if (checked) {
                        const toAdd = new Set(checkedFiles.value);
                        visibleFilesInDir.forEach(p => toAdd.add(p));
                        checkedFiles.value = Array.from(toAdd);
                    } else {
                        const toRemove = new Set(visibleFilesInDir);
                        checkedFiles.value = checkedFiles.value.filter(p => !toRemove.has(p));
                    }
                }

                async function expandFile(file) {
                    if (!expandedFiles[file]) {
                        try {
                            const response = await axios.post('/api', { action: 'list_content_blocks', path: file });
                            expandedFiles[file] = response.data.blocks || [];
                            checkedContentBlocks[file] = [];
                        } catch (e) { console.error('Error fetching file blocks:', e); }
                    } else {
                        delete expandedFiles[file];
                        delete checkedContentBlocks[file];
                    }
                }

                function getBlockName({ signature, lineNumber }) {
                    const regex = /^(?:function|const|let|var)?\s*(\w+)\s*(?:=\s*(?:async\s*)?\(|(?:async\s*)?\(|\(|=)/;
                    const match = signature.match(regex);
                    const name = match ? match[1] : signature;
                    return `${name} : ${lineNumber}`;
                }

                async function viewFiles() {
                    if (!checkedFilesNonDir.value.length) {
                        notify({ title: 'View files', message: 'Please check at least one file.', level: 'warn' });
                        return;
                    }
                    try {
                        const response = await axios.post('/api', {
                            action: 'get_file_contents',
                            paths: checkedFilesNonDir.value,
                            blocks: checkedContentBlocks
                        });
                        fileContents.value = response.data.contents || [];
                        searchResult.value = null;
                        replaceResult.value = null;
                    } catch (e) { console.error('Error fetching file contents:', e); }
                }

                async function viewFilesOutline() {
                    if (!checkedFilesNonDir.value.length) {
                        notify({ title: 'View files', message: 'Please check at least one file.', level: 'warn' });
                        return;
                    }
                    try {
                        const response = await axios.post('/api', {
                            action: 'get_file_contents_outline',
                            paths: checkedFilesNonDir.value
                        });
                        fileContents.value = response.data.contents || [];
                        searchResult.value = null;
                        replaceResult.value = null;
                    } catch (e) { console.error('Error fetching file contents:', e); }
                }

                function onPrimary(file) {
                    if (kindOf(file) === 'text') return viewSingleFile(file);
                    return downloadSingle(file);
                }

                function getMenuItems(file) {
                    if (kindOf(file) === 'text') {
                        const items = [];
                        if (isExpandableFile(file)) items.push({ label: 'List', action: () => expandFile(file) });
                        items.push(
                            { label: 'Outline', action: () => viewSingleFileOutline(file) },
                            { label: 'Edit', action: () => editFile(file) },
                            { label: 'Rename', action: () => renameFile(file) },
                            { label: 'Download', action: () => downloadSingle(file) },
                            { label: 'Delete', action: () => deleteFile(file) }
                        );
                        return items;
                    }
                    return [
                        { label: 'Rename', action: () => renameFile(file) },
                        { label: 'Download', action: () => downloadSingle(file) },
                        { label: 'Delete', action: () => deleteFile(file) }
                    ];
                }

                async function downloadSingle(path) {
                    try {
                        const res = await axios.post('/api', {
                            action: 'download_files',
                            paths: [path],
                            blocks: {}
                        }, {
                            responseType: 'blob'
                        });
                        const blob = new Blob([res.data]);
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = path.split('/').pop();
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        URL.revokeObjectURL(url);
                    } catch (e) {
                        console.error(e);
                        notify({
                            title: 'Download failed',
                            message: `Could not download ${getRelativePath(path)}. ${formatAxiosError(e)}`,
                            level: 'error'
                        });
                    }
                }

                async function downloadFiles() {
                    if (!checkedFilesNonDir.value.length) {
                        notify({ title: 'Download', message: 'Please check at least one file.', level: 'warn' });
                        return;
                    }

                    try {
                        const response = await axios.post(
                            '/api',
                            {
                                action: 'download_files',
                                paths: checkedFilesNonDir.value,
                                blocks: checkedContentBlocks
                            },
                            { responseType: 'blob' }
                        );

                        const blob = new Blob([response.data], { type: 'application/zip' });
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `downloaded_files_${new Date().toISOString().replace(/[:.]/g, '-')}.zip`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    } catch (e) {
                        console.error('Error downloading files:', e);
                        notify({ title: 'Download', message: `Failed to download files. ${formatAxiosError(e)}`, level: 'error' });
                    }
                }

                function updateCheckedFiles(file, block) {
                    const blockIndex = checkedContentBlocks[file].indexOf(block.offset);
                    if (blockIndex !== -1) {
                        if (!checkedFiles.value.includes(file)) checkedFiles.value.push(file);
                    } else {
                        if (checkedContentBlocks[file].length === 0) {
                            const fileIndex = checkedFiles.value.indexOf(file);
                            if (fileIndex !== -1) checkedFiles.value.splice(fileIndex, 1);
                        }
                    }
                }
                function ensureParentBlocksChecked(file, block) {
                    if (!block.parentOffsets || block.parentOffsets.length === 0) return;
                    const fileBlocks = expandedFiles[file]; if (!fileBlocks) return;
                    for (const parentOffset of block.parentOffsets) {
                        const parentBlock = fileBlocks.find(b => b.offset === parentOffset);
                        if (parentBlock) {
                            if (!checkedContentBlocks[file]) checkedContentBlocks[file] = [];
                            if (!checkedContentBlocks[file].includes(parentOffset)) checkedContentBlocks[file].push(parentOffset);
                        }
                    }
                }
                function onClickContentBlock(file, block) { updateCheckedFiles(file, block); ensureParentBlocksChecked(file, block); }

                function checkAllFiles() {
                    // Chỉ check các FILES (không phải directories) trong filtered list
                    const filesToCheck = filteredMiddlePaneItems.value
                        .filter(item => item.type === 'file')
                        .map(item => item.path);

                    const toAdd = new Set(checkedFiles.value);
                    filesToCheck.forEach(p => toAdd.add(p));
                    checkedFiles.value = Array.from(toAdd);
                }

                function clearCheckedFiles() {
                    // Chỉ uncheck các FILES trong filtered list
                    const filesToUncheck = new Set(
                        filteredMiddlePaneItems.value
                            .filter(item => item.type === 'file')
                            .map(item => item.path)
                    );
                    checkedFiles.value = checkedFiles.value.filter(p => !filesToUncheck.has(p));

                    // Cleanup blocks cho những files bị uncheck
                    for (const file of filesToUncheck) {
                        if (checkedContentBlocks[file]) {
                            checkedContentBlocks[file] = [];
                        }
                    }

                    // Chỉ clear fileContents và search results nếu không còn file nào checked
                    if (checkedFiles.value.length === 0) {
                        fileContents.value = [];
                    }

                    searchResult.value = null;
                    replaceResult.value = null;
                }
                function clearSelectedFiles() {
                    selectedFilesSnapshot.value = [];   // xóa snapshot
                    selectedFiles.value = [];           // và cả left hiện thời
                    checkedFiles.value = [];
                    fileContents.value = [];
                    for (const file in checkedContentBlocks) { checkedContentBlocks[file] = []; }
                    searchResult.value = null;
                    replaceResult.value = null;
                }
                function removeSelectedFile(file) {
                    if (!file) return;

                    const item = files.value.find(f => f.path === file);
                    const isDir = item?.type === 'directory';

                    if (isDir) {
                        const prefix = file.endsWith('/') ? file : file + '/';
                        const filesInDir = files.value
                            .filter(f => f.type === 'file' && f.path.startsWith(prefix))
                            .map(f => f.path);

                        // Remove from selections
                        selectedFiles.value = selectedFiles.value.filter(p =>
                            p !== file && !p.startsWith(prefix)
                        );
                        selectedFilesSnapshot.value = selectedFilesSnapshot.value.filter(p =>
                            p !== file && !p.startsWith(prefix)
                        );

                        // Uncheck all
                        const toRemove = new Set([file, ...filesInDir]);
                        checkedFiles.value = checkedFiles.value.filter(p => !toRemove.has(p));

                        // Cleanup blocks and editing state for all files in directory
                        filesInDir.forEach(fp => {
                            if (expandedFiles[fp]) delete expandedFiles[fp];
                            if (checkedContentBlocks[fp]) delete checkedContentBlocks[fp];

                            // Close editor if editing any file in this directory
                            if (editingFile.value === fp) {
                                editingFile.value = '';
                                editingContent.value = '';
                            }
                        });

                        // Remove from fileContents
                        if (Array.isArray(fileContents.value) && fileContents.value.length) {
                            fileContents.value = fileContents.value.filter(item =>
                                !toRemove.has(item?.path)
                            );
                        }
                    } else {
                        selectedFiles.value = (selectedFiles.value || []).filter(p => p !== file);
                        selectedFilesSnapshot.value = (selectedFilesSnapshot.value || []).filter(p => p !== file);

                        checkedFiles.value = (checkedFiles.value || []).filter(p => p !== file);

                        if (expandedFiles[file]) delete expandedFiles[file];
                        if (checkedContentBlocks[file]) delete checkedContentBlocks[file];

                        if (editingFile.value === file) {
                            editingFile.value = '';
                            editingContent.value = '';
                        }

                        if (Array.isArray(fileContents.value) && fileContents.value.length) {
                            fileContents.value = fileContents.value.filter(i => i?.path !== file);
                        }
                    }
                }

                // ===== Save/Load list actions =====
                function openSaveListDialog() {
                    if (!checkedFilesNonDir.value.length) {
                        toast({ title: 'Save to list', message: 'No checked files.', level: 'warn' });
                        return;
                    }
                    listDialog.mode = 'save';
                    listDialog.open = true;
                }
                function openLoadFromListDialog() {
                    if (!Object.keys(fileLists.value || {}).length) {
                        toast({ title: 'Load from list', message: 'No lists available.', level: 'info' });
                        return;
                    }
                    listDialog.mode = 'load';
                    listDialog.open = true;
                }
                function closeListDialog() { listDialog.open = false; }

                function handleListConfirm({ mode, listName, isNew, option }) {
                    const name = String(listName || '').trim();
                    if (!name) { toast({ title: 'List', message: 'List name is required.', level: 'warn' }); return; }
                    if (mode === 'save') {
                        const exists = !!fileLists.value[name];
                        if (isNew && exists) {
                            toast({ title: 'Save to list', message: 'List already exists.', level: 'error' });
                            return;
                        }
                        if (isNew && !exists && Object.keys(fileLists.value).length >= LIMITS.MAX_LISTS) {
                            toast({ title: 'Save to list', message: 'List limit reached.', level: 'error' });
                            return;
                        }
                        const now = Date.now();
                        const src = uniq(checkedFilesNonDir.value).slice(0, LIMITS.MAX_FILES_PER_LIST);
                        // Overwrite mode by default
                        const merged = src;
                        const createdAt = exists ? (fileLists.value[name]?.createdAt || now) : now;
                        fileLists.value = { ...fileLists.value, [name]: { files: merged, createdAt, updatedAt: now } };
                        saveListsToStorage();
                        closeListDialog();
                        return;
                    }
                    // load
                    if (!fileLists.value[name] || !Array.isArray(fileLists.value[name].files)) {
                        toast({ title: 'Load from list', message: 'Selected list not found.', level: 'error' });
                        return;
                    }
                    const saved = fileLists.value[name].files || [];
                    const existing = new Set(
                        (files.value || []).filter(f => f?.type === 'file').map(f => f.path)
                    );
                    const toLoad = saved.filter(p => existing.has(p));
                    const skipped = saved.length - toLoad.length;
                    // always replace
                    const keep = new Set(toLoad);
                    checkedFiles.value = [...keep];
                    selectedFilesSnapshot.value = uniq([...(selectedFilesSnapshot.value || []), ...toLoad]);
                    // clear block selections of files not in keep
                    for (const k of Object.keys(checkedContentBlocks)) {
                        if (!keep.has(k)) delete checkedContentBlocks[k];
                    }
                    saveStateToLocalStorage();
                    closeListDialog();
                }
                function handleListDelete(name) {
                    const n = String(name || '').trim();
                    if (!n) return;
                    if (!fileLists.value[n]) {
                        toast({ title: 'Delete list', message: 'List not found.', level: 'error' });
                        return;
                    }
                    const next = { ...(fileLists.value || {}) };
                    delete next[n];
                    fileLists.value = next;
                    saveListsToStorage();
                    if (!Object.keys(next).length && listDialog.mode === 'load') listDialog.open = false;
                }
                async function viewSingleFile(file) {
                    try {
                        const response = await axios.post('/api', { action: 'get_file_contents', paths: [file], blocks: checkedContentBlocks });
                        fileContents.value = response.data.contents || [];
                        searchResult.value = null;
                        replaceResult.value = null;
                    } catch (e) { console.error('Error fetching file contents:', e); }
                }

                async function viewSingleFileOutline(file) {
                    try {
                        const response = await axios.post('/api', { action: 'get_file_contents_outline', paths: [file] });
                        fileContents.value = response.data.contents || [];
                        searchResult.value = null;
                        replaceResult.value = null;
                    } catch (e) { console.error('Error fetching file contents:', e); }
                }

                async function editFile(file) {
                    try {
                        editingFile.value = file;
                        const response = await axios.post('/api', { action: 'get_file_content', path: file });
                        editingContent.value = response.data.content || '';
                    } catch (e) { console.error('Error fetching file content:', e); }
                }

                function renameFile(file) {
                    renameDialog.filePath = file;
                    renameDialog.open = true;
                }

                async function handleRenameConfirm(newName) {
                    const oldPath = renameDialog.filePath;
                    if (!oldPath || !newName) return;

                    try {
                        const response = await axios.post('/api', {
                            action: 'rename_file',
                            path: oldPath,
                            new_name: newName
                        });

                        if (response.data.success && response.data.new_path) {
                            const newPath = response.data.new_path;

                            // Update files array
                            const fileIndex = files.value.findIndex(f => f.path === oldPath);
                            if (fileIndex !== -1) {
                                files.value[fileIndex].path = newPath;
                            }

                            // Update selectedFiles
                            const selectedIndex = selectedFiles.value.indexOf(oldPath);
                            if (selectedIndex !== -1) {
                                selectedFiles.value[selectedIndex] = newPath;
                            }

                            // Update selectedFilesSnapshot
                            const snapshotIndex = selectedFilesSnapshot.value.indexOf(oldPath);
                            if (snapshotIndex !== -1) {
                                selectedFilesSnapshot.value[snapshotIndex] = newPath;
                            }

                            // Update checkedFiles
                            const checkedIndex = checkedFiles.value.indexOf(oldPath);
                            if (checkedIndex !== -1) {
                                checkedFiles.value[checkedIndex] = newPath;
                            }

                            // Update expandedFiles (rename key)
                            if (expandedFiles[oldPath]) {
                                expandedFiles[newPath] = expandedFiles[oldPath];
                                delete expandedFiles[oldPath];
                            }

                            // Update checkedContentBlocks (rename key)
                            if (checkedContentBlocks[oldPath]) {
                                checkedContentBlocks[newPath] = checkedContentBlocks[oldPath];
                                delete checkedContentBlocks[oldPath];
                            }

                            // Update editingFile if it's being edited
                            if (editingFile.value === oldPath) {
                                editingFile.value = newPath;
                            }

                            toast({ title: 'Rename', message: 'File renamed successfully', level: 'success' });
                        }
                    } catch (e) {
                        console.error('Rename error:', e);
                        notify({ title: 'Rename failed', message: formatAxiosError(e), level: 'error' });
                    } finally {
                        renameDialog.open = false;
                        renameDialog.filePath = '';
                    }
                }

                function deleteFile(file) {
                    deleteDialog.filePath = file;
                    deleteDialog.message = `Are you sure you want to delete?`;
                    deleteDialog.open = true;
                }

                async function handleDeleteConfirm() {
                    const filePath = deleteDialog.filePath;
                    if (!filePath) return;

                    try {
                        const response = await axios.post('/api', {
                            action: 'delete_file',
                            path: filePath
                        });

                        if (response.data.success) {
                            // Remove from all state
                            files.value = files.value.filter(f => f.path !== filePath);
                            removeSelectedFile(filePath);

                            toast({ title: 'Delete', message: 'File deleted successfully', level: 'success' });
                        }
                    } catch (e) {
                        console.error('Delete error:', e);
                        notify({ title: 'Delete failed', message: formatAxiosError(e), level: 'error' });
                    } finally {
                        deleteDialog.open = false;
                        deleteDialog.filePath = '';
                        deleteDialog.message = '';
                    }
                }

                function requestDeleteRecentPath(path) {
                    deleteRecentPathDialog.path = path;
                    deleteRecentPathDialog.message = `Are you sure you want to remove this recent path?`;
                    deleteRecentPathDialog.open = true;
                }

                function handleDeleteRecentPathConfirm() {
                    const pathToDelete = deleteRecentPathDialog.path;
                    if (!pathToDelete) return;

                    recentPaths.value = recentPaths.value.filter(p => p !== pathToDelete);
                    saveStateToLocalStorage();

                    toast({ title: 'Recent Paths', message: 'Path removed from recent list', level: 'success' });

                    deleteRecentPathDialog.open = false;
                    deleteRecentPathDialog.path = '';
                    deleteRecentPathDialog.message = '';
                }

                function getRelativePath(fullPath) {
                    for (const basePath of recentPaths.value) {
                        if (fullPath.startsWith(basePath)) {
                            fullPath = fullPath.substring(basePath.length).replace(/^[\/\\]/, '');
                            return fullPath;
                        }
                    }
                    return fullPath;
                }

                async function openLinksDialog() {
                    // Get files to show
                    const visibleFiles = filteredMiddlePaneItems.value
                        .filter(item => item.type === 'file')
                        .map(item => item.path);

                    const checkedVisibleFiles = visibleFiles.filter(p => checkedFiles.value.includes(p));
                    const filesToShow = checkedVisibleFiles.length > 0 ? checkedVisibleFiles : visibleFiles;

                    if (!filesToShow.length) {
                        toast({ title: 'Links', message: 'No files to show.', level: 'warn' });
                        return;
                    }

                    linksDialog.open = true;
                    linksDialog.mode = 'relative';
                    linksDialog.loading = false;

                    // Generate initial links
                    await updateLinksContent(filesToShow);
                }

                async function updateLinksContent(filePaths) {
                    if (linksDialog.mode === 'relative') {
                        linksDialog.links = filePaths.map(p => getRelativePath(p)).join('\n');
                    } else if (linksDialog.mode === 'full') {
                        linksDialog.links = filePaths.join('\n');
                    } else if (linksDialog.mode === 'public') {
                        linksDialog.loading = true;
                        try {
                            const baseUrl = window.location.origin + '/api';

                            const response = await axios.post('/api', {
                                action: 'generate_public_links',
                                paths: filePaths
                            });

                            const links = (response.data.links || []).map(item => {
                                // Calculate relative path on frontend
                                const relpath = getRelativePath(item.path);
                                const relpathEncoded = encodeURIComponent(relpath);
                                return `${baseUrl}?action=get_raw_content&relpath=${relpathEncoded}&token=${item.token}`;
                            });
                            linksDialog.links = links.join('\n');
                        } catch (e) {
                            console.error('Error generating public links:', e);
                            toast({ title: 'Links', message: `Failed to generate public links. ${formatAxiosError(e)}`, level: 'error' });
                            linksDialog.links = '';
                        } finally {
                            linksDialog.loading = false;
                        }
                    } else if (linksDialog.mode === 'ai') {
                        linksDialog.loading = true;
                        try {
                            const baseUrl = window.location.origin + '/api';

                            const response = await axios.post('/api', {
                                action: 'generate_public_links',
                                paths: filePaths
                            });

                            const links = (response.data.links || []).map(item => {
                                const relpath = getRelativePath(item.path);
                                return `${relpath},${item.token}`;
                            });
                            linksDialog.links = '# File List (PATH → TOKEN)\n' + links.join('\n') + '\n\n# Để đọc nội dung file, dùng curl với SSL verification disabled:\ncurl -k "' + `${baseUrl}?action=get_raw_content&token={TOKEN}` + '"';
                        } catch (e) {
                            console.error('Error generating public links:', e);
                            toast({ title: 'Links', message: `Failed to generate public links. ${formatAxiosError(e)}`, level: 'error' });
                            linksDialog.links = '';
                        } finally {
                            linksDialog.loading = false;
                        }
                    }
                }

                function closeLinksDialog() {
                    linksDialog.open = false;
                    linksDialog.links = '';
                }

                function handleLinksCopy(success) {
                    if (success) {
                        toast({ title: 'Links', message: 'Links copied to clipboard!', level: 'success' });
                    }
                }

                // Watch mode changes to regenerate links
                watch(() => linksDialog.mode, async () => {
                    if (!linksDialog.open) return;

                    const visibleFiles = filteredMiddlePaneItems.value
                        .filter(item => item.type === 'file')
                        .map(item => item.path);

                    const checkedVisibleFiles = visibleFiles.filter(p => checkedFiles.value.includes(p));
                    const filesToShow = checkedVisibleFiles.length > 0 ? checkedVisibleFiles : visibleFiles;

                    await updateLinksContent(filesToShow);
                });

                // Right pane helpers (now respect report view)
                async function copyMergeContent() {
                    const text = mergeContent.value;
                    if (!text) return;
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        try {
                            await navigator.clipboard.writeText(text);
                            toast({ title: 'Clipboard', message: 'Content copied to clipboard!', level: 'success' });
                        } catch (err) {
                            console.error('Failed to copy via Clipboard API:', err);
                            toast({ title: 'Clipboard', message: `Copy failed. ${formatAxiosError(err)}`, level: 'error' });
                        }
                    } else { fallbackCopyToClipboard(text); }
                }
                function fallbackCopyToClipboard(text) {
                    const textArea = document.createElement("textarea");
                    textArea.value = text; textArea.style.position = "fixed"; textArea.style.top = "-9999px";
                    document.body.appendChild(textArea); textArea.focus(); textArea.select();
                    try {
                        if (document.execCommand('copy')) {
                            toast({ title: 'Clipboard', message: 'Content copied to clipboard!', level: 'success' });
                        } else {
                            throw new Error('execCommand returned false');
                        }
                    } catch (err) {
                        console.error('Fallback copy failed:', err);
                        toast({ title: 'Clipboard', message: `Copy failed. ${formatAxiosError(err)}`, level: 'error' });
                    }
                    document.body.removeChild(textArea);
                }
                function downloadMergeContent() {
                    const blob = new Blob([mergeContent.value], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'merged_content.txt';
                    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                }

                function clearLeftPane() {
                     // Clear snapshot cũ để tránh file cũ bị check all sau này
                     selectedFilesSnapshot.value = [];

                     // Bỏ chọn ở left
                     selectedFilesSnapshot.value = [...selectedFilesForMiddle.value];

                     filterKeyword.value = '';
                     selectedFiles.value = [];
                }

                async function saveContent(content) {
                    try { await axios.post('/api', { action: 'save_file_content', path: editingFile.value, content }); }
                    catch (e) {
                        console.error('Error saving content:', e);
                        notify({
                            title: 'Save file',
                            message: `Failed to save ${getRelativePath(editingFile.value)}. ${formatAxiosError(e)}`,
                            level: 'error'
                        });
                    }
                }

                function collapseLeftPanes() { collapseLevel.value += 1; }
                function expandPanes() { collapseLevel.value = 0; }

                async function runSearch() {
                    if (!searchQuery.value) {
                        notify({ title: 'Search', message: 'Enter a search string.', level: 'warn' });
                        return;
                    }

                    const paths = checkedFilesNonDirText.value;

                    if (!paths.length) {
                        notify({ title: 'Search', message: 'Please check at least one text file.', level: 'warn' });
                        return;
                    }

                    try {
                        const res = await axios.post('/api', {
                            action: 'search_in_files',
                            paths,
                            pattern: searchQuery.value,
                            options: { case_sensitive: true, regex: false }
                        });
                        searchResult.value = res.data;
                        replaceResult.value = null;
                        fileContents.value = [];
                    } catch (e) {
                        console.error('Search error:', e);
                        notify({ title: 'Search', message: `Search failed. ${formatAxiosError(e)}`, level: 'error' });
                    }
                }

                async function runReplace() {
                    if (!searchQuery.value) {
                        notify({ title: 'Replace', message: 'Enter a search string first.', level: 'warn' });
                        return;
                    }

                    const paths = checkedFilesNonDirText.value;

                    if (!paths.length) {
                        notify({ title: 'Replace', message: 'Please check at least one text file.', level: 'warn' });
                        return;
                    }

                    try {
                        // 1) Lấy chi tiết match (để render giống mẫu)
                        const searchRes = await axios.post('/api', {
                            action: 'search_in_files',
                            paths,
                            pattern: searchQuery.value,
                            options: { case_sensitive: true, regex: false }
                        });

                        // 2) Gọi replace thực sự (áp dụng thay đổi)
                        const replaceRes = await axios.post('/api', {
                            action: 'replace_in_files',
                            paths,
                            pattern: searchQuery.value,
                            replacement: replaceQuery.value ?? '',
                            options: { case_sensitive: true, regex: false, dry_run: false }
                        });

                        // 3) Hợp nhất dữ liệu hiển thị: dùng matches từ search (có lines/preview),
                        //    và giữ summary của search để in header giống mẫu.
                        //    Nếu anh muốn, có thể gắn thêm replaceRes.summary vào data để xem nội bộ.
                        replaceResult.value = {
                            summary: searchRes.data?.summary || { scanned: 0, matched_files: 0, total_matches: 0 },
                            matches: searchRes.data?.matches || [],
                            _replaceSummary: replaceRes.data?.summary || null   // optional, không render
                        };

                        searchResult.value = null;
                        fileContents.value = [];
                    } catch (e) {
                        console.error('Replace error:', e);
                        notify({ title: 'Replace', message: `Replace failed. ${formatAxiosError(e)}`, level: 'error' });
                    }
                }

                function openSelectedTree() {
                    const all = files.value || [];
                    const useChecked = (checkedFilesNonDir.value || []).length > 0;
                    const basis = useChecked
                        ? new Set(checkedFilesNonDir.value)
                        : new Set(selectedFilesForMiddle.value || []);
                    const subset = all.filter(f => f?.type === 'file' && basis.has(f.path));
                    if (!subset.length) {
                        notify({ title: 'Directory Structure', message: 'No matching files.', level: 'info' });
                        return;
                    }
                    const tree = renderDirectoryTree(subset);
                    notify({ title: 'Directory Structure', message: tree });
                }

                function toggleDarkMode() {
                    darkMode.value = !darkMode.value;
                }

                return {
                    kindOf,
                    mobileMenuOpen, toggleMobileMenu, closeMobileMenu,
                    directoryPath, files, selectedFiles, selectedFilesNonDir,
                    checkedFiles, checkedFilesNonDir, fileContents, filterKeyword, filteredFiles,
                    mergeContent, analyzeDirectory, toggleDirectorySelection, viewFiles, viewFilesOutline, viewSingleFile, viewSingleFileOutline, downloadSingle, downloadFiles,
                    getRelativePath, clearLeftPane, selectedFilesForMiddle, recentPaths, showRecentPaths,
                    expandedFiles, checkedContentBlocks, isExpandableFile, expandFile, getBlockName, checkAllFiles, clearCheckedFiles,
                    clearSelectedFiles, removeSelectedFile, onClickContentBlock, saveContent, collapseLeftPanes, expandPanes, editFile, editingFile, editingContent,
                    collapseLevel, renderDirectoryTree,
                    searchQuery, replaceQuery, runSearch, runReplace, searchResult, replaceResult,
                    copyMergeContent, downloadMergeContent,
                    onPrimary, getMenuItems,
                    middleWidth, minMiddle, DEFAULT_MIDDLE, computeMaxMiddle,
                    leftWidth, minLeft, DEFAULT_LEFT, computeMaxLeft,
                    middlePaneFilter,
                    filteredMiddlePaneItems,
                    hasCheckedVisibleFiles,
                    isDirectoryCheckedInMiddle,
                    toggleDirectoryCheckInMiddle,
                    openSelectedTree,
                    fileLists, listDialog,
                    openSaveListDialog, openLoadFromListDialog, closeListDialog, handleListConfirm, handleListDelete,
                    toggleDarkMode, darkMode,
                    renameDialog, deleteDialog,
                    handleRenameConfirm,
                    handleDeleteConfirm,
                    deleteRecentPathDialog,
                    requestDeleteRecentPath, handleDeleteRecentPathConfirm,
                    linksDialog, openLinksDialog, closeLinksDialog, handleLinksCopy,
                    showLoginDialog,
                    authUsername,
                    handleLoginSuccess,
                    handleLogout
                };
            }
        });

        app.mount('#app');
    </script>
</body>
</html>
